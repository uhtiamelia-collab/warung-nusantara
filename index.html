<script type="module">

import {initializeApp}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {
getFirestore,
collection,
getDocs,
addDoc,
serverTimestamp,
onSnapshot,
doc,
updateDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig={

apiKey:"AIzaSyD-m7sqOLaZ8-bWLZeGVPTXT-Qp1vQIycQ",

authDomain:"warung-nusantara-9f331.firebaseapp.com",

projectId:"warung-nusantara-9f331",

storageBucket:"warung-nusantara-9f331.firebasestorage.app",

messagingSenderId:"68513276988",

appId:"1:68513276988:web:b13b148a51ce216efecf39"

};


const app=initializeApp(firebaseConfig);

const db=getFirestore(app);



let restaurantId="jombang01";

let restaurants={};

let cart=[];

let stopOrder=null;



const restoSelect=document.getElementById("restoSelect");
const restoInfo=document.getElementById("restoInfo");
const menuList=document.getElementById("menuList");

const cartBox=document.getElementById("cartBox");
const totalBox=document.getElementById("total");

const ordersList=document.getElementById("ordersList");

const nama=document.getElementById("nama");
const phone=document.getElementById("phone");
const meja=document.getElementById("meja");

const pesanStatus=document.getElementById("pesanStatus");





// =====================
// NOMOR MEJA
// =====================


function loadMeja(){

let html="";

html+=`
<option value="">
Pilih Nomor Meja
</option>
`;


for(let i=1;i<=50;i++){

html+=`

<option value="${i}">
Meja ${i}
</option>

`;

}


meja.innerHTML=html;


}


loadMeja();





// =====================
// LOAD RESTORAN
// =====================


async function loadRestaurant(){


const snap =
await getDocs(
collection(db,"restaurants")
);



let html="";



snap.forEach(d=>{


restaurants[d.id]=d.data();


html+=`

<option value="${d.id}">
${d.data().name}
</option>

`;



});



restoSelect.innerHTML=html;



if(restaurants["jombang01"]){

restaurantId="jombang01";

restoSelect.value="jombang01";

}



showRestaurant();

loadMenu();

loadOrders();


}


loadRestaurant();







// =====================
// GANTI CABANG
// =====================


window.gantiRestoran=function(){


restaurantId=restoSelect.value;


cart=[];

renderCart();


showRestaurant();

loadMenu();

loadOrders();


}







// =====================
// INFO
// =====================


function showRestaurant(){


let r=restaurants[restaurantId];


if(!r){

restoInfo.innerHTML="Restoran tidak ditemukan";

return;

}



restoInfo.innerHTML=`

<h2>
🍽️ ${r.name}
</h2>


<p>
📍 ${r.address || "-"}
</p>


<p>
Status :
${r.status || "Buka"}
</p>


`;



}









// =====================
// MENU
// =====================


async function loadMenu(){


menuList.innerHTML="Loading menu...";


const snap=
await getDocs(

collection(
db,
"restaurants",
restaurantId,
"menus"

)

);



let html="";



snap.forEach(d=>{


let m=d.data();


let harga=Number(m.price || 0);



html+=`

<div class="card">


<img src="${m.imageUrl || 'https://via.placeholder.com/300'}">


<h3>
${m.name}
</h3>


<p>
Rp ${harga.toLocaleString("id-ID")}
</p>



<button onclick='tambah(${JSON.stringify(m.name)},${harga})'>

+ Pesan

</button>



</div>

`;



});



menuList.innerHTML=
html || "Menu kosong";


}










// =====================
// CART
// =====================


window.tambah=function(name,price){


cart.push({

name:name,

price:price

});


renderCart();


}





function renderCart(){


let html="";

let total=0;



cart.forEach(item=>{


html+=`

<p>

${item.name}

Rp ${item.price.toLocaleString("id-ID")}

</p>

`;


total+=item.price;


});



cartBox.innerHTML=
html || "Kosong";


totalBox.innerHTML=

"Rp "+total.toLocaleString("id-ID");



}









// =====================
// CHECKOUT
// =====================


window.checkout=async function(){



if(cart.length==0){

alert("Pilih menu dulu");

return;

}



if(
nama.value=="" ||
phone.value=="" ||
meja.value==""
){

alert("Lengkapi data");

return;

}



let total =
cart.reduce(
(a,b)=>a+b.price,
0
);





await addDoc(


collection(

db,

"restaurants",

restaurantId,

"orders"

),


{


restaurantId:restaurantId,


customerName:nama.value,


phone:phone.value,


tableNumber:meja.value,


items:cart,


totalPrice:total,


status:"Pending",


createdAt:serverTimestamp()


}


);



cart=[];


renderCart();


pesanStatus.innerHTML=
"✅ Pesanan berhasil";



}









// =====================
// REALTIME ORDER
// =====================


function loadOrders(){



if(stopOrder){

stopOrder();

}



stopOrder=
onSnapshot(


collection(

db,

"restaurants",

restaurantId,

"orders"

),


snap=>{


let html="";



snap.forEach(d=>{


let o=d.data();



html+=`

<div class="card">


<h3>
👤 ${o.customerName}
</h3>


<p>
📞 ${o.phone}
</p>


<p>
🪑 Meja ${o.tableNumber}
</p>


<p>
Total :
Rp ${Number(o.totalPrice).toLocaleString("id-ID")}
</p>



<select onchange="ubahStatus('${d.id}',this.value)">


<option ${o.status=="Pending"?"selected":""}>
Pending
</option>


<option ${o.status=="Diproses"?"selected":""}>
Diproses
</option>


<option ${o.status=="Selesai"?"selected":""}>
Selesai
</option>


</select>



</div>


`;


});



ordersList.innerHTML=
html || "Belum ada pesanan";


}


);



}







window.ubahStatus=
async function(id,status){


await updateDoc(

doc(

db,

"restaurants",

restaurantId,

"orders",

id

),


{

status:status

}


);


}



</script>
