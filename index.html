<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warung Nusantara</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>


body{

font-family:Poppins,sans-serif;
background:#fff0f5;
margin:0;
color:#5a3038;

}


header{

background:linear-gradient(135deg,#ffb6c1,#ffc0cb);
padding:35px;
text-align:center;
color:#8b2f4d;
border-radius:0 0 40px 40px;

}


.container{

width:90%;
max-width:1100px;
margin:30px auto;

}



.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}



.card{

background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin-bottom:20px;

}



.card img{

width:100%;
height:200px;
object-fit:cover;
border-radius:15px;

}



h2,h3{

color:#a33b5c;

}



button{

background:#e75480;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:15px;
cursor:pointer;

}



button:hover{

background:#c2185b;

}



input{

width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ffc0cb;

}


.status{

color:#e75480;
font-weight:bold;

}



</style>


</head>


<body>


<header>

<h1>🍽️ Warung Nusantara</h1>

<p>
Sistem Pemesanan Digital Firestore
</p>

</header>



<div class="container">



<h2>Pilih Lokasi Restoran</h2>


<div id="restaurantList"></div>




<h2>Menu Restoran</h2>


<div id="menuList" class="grid"></div>





<h2>🛒 Form Pesanan</h2>


<input id="nama" placeholder="Nama Customer">


<input id="phone" placeholder="Nomor HP">


<input id="meja" placeholder="Nomor Meja">



<div class="card">

<h3>Keranjang</h3>


<div id="cartBox">

Keranjang kosong

</div>


<h3 id="total">

Total : Rp 0

</h3>


<button onclick="checkout()">

Kirim Pesanan

</button>


<p id="pesanStatus" class="status"></p>


</div>






<h2>📦 Data Pesanan</h2>


<div id="ordersList"></div>



</div>








<script type="module">



import {initializeApp}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {


getFirestore,

collection,

getDocs,

addDoc,

serverTimestamp,

onSnapshot


}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





// FIREBASE CONFIG


const firebaseConfig = {


apiKey:
"AIzaSyD-m7sqOLaZ8-bWLZeGVPTXT-Qp1vQIycQ",


authDomain:
"warung-nusantara-9f331.firebaseapp.com",


projectId:
"warung-nusantara-9f331",


storageBucket:
"warung-nusantara-9f331.firebasestorage.app",


messagingSenderId:
"68513276988",


appId:
"1:68513276988:web:b13b148a51ce216efecf39"


};



const app = initializeApp(firebaseConfig);


const db=getFirestore(app);



let restaurantId="";


let cart=[];







// ==========================
// TAMPIL RESTORAN
// ==========================



async function tampilRestoran(){



const data = await getDocs(

collection(db,"restaurants")

);



let html="";



data.forEach((doc)=>{


let r=doc.data();



html += `


<div class="card">


<h2>

🍽️ ${r.name || doc.id}

</h2>



<p>

📍 ${r.address || "-"}

</p>



<p>

🕒 ${r.openHour || "08:00 - 21:00"}

</p>



<p>

Status :

<b>

${r.status || "Buka"}

</b>

</p>



<button onclick="pilihRestoran('${doc.id}')">

Lihat Menu

</button>


</div>


`;



});



document.getElementById("restaurantList").innerHTML=html;


}



tampilRestoran();








// ==========================
// PILIH RESTORAN
// ==========================


window.pilihRestoran=function(id){


restaurantId=id;


loadMenu();



};







// ==========================
// MENU
// ==========================



async function loadMenu(){



const data = await getDocs(

collection(

db,

"restaurants",

restaurantId,

"menus"

)

);



let html="";



data.forEach((doc)=>{


let m=doc.data();



let harga = Number(m.price || 0);



html += `


<div class="card">


<img src="${m.imageUrl || 'https://via.placeholder.com/300'}">



<h3>

${m.name || "Menu"}

</h3>



<p>

${m.category || ""}

</p>



<p>

Rp ${harga.toLocaleString()}

</p>



<button onclick="tambah('${m.name}',${harga})">

+ Pesan

</button>


</div>


`;



});



document.getElementById("menuList").innerHTML=html;


}








// ==========================
// TAMBAH CART
// ==========================


window.tambah=function(name,price){


cart.push({

name,
price

});


tampilCart();



};





function tampilCart(){


let html="";

let total=0;



cart.forEach((x)=>{


html+=`

<p>

${x.name}

Rp ${x.price.toLocaleString()}

</p>

`;



total+=x.price;



});



document.getElementById("cartBox").innerHTML=

html || "Keranjang kosong";



document.getElementById("total").innerHTML=

"Total : Rp "+total.toLocaleString();



}







// ==========================
// CHECKOUT
// ==========================



window.checkout=async function(){



if(!restaurantId){

alert("Pilih restoran dulu");

return;

}



if(cart.length==0){

alert("Pilih menu dulu");

return;

}




let nama=document.getElementById("nama").value;


let phone=document.getElementById("phone").value;


let meja=document.getElementById("meja").value;



let total = cart.reduce(

(a,b)=>a+b.price,

0

);



let order = await addDoc(

collection(db,"orders"),

{


restaurantId,


customerName:nama,


phone,


tableNumber:meja,


status:"Pending",


totalPrice:total,


createdAt:serverTimestamp()


}


);




for(let item of cart){



await addDoc(

collection(

db,

"orders",

order.id,

"items"

),


{


menuName:item.name,


price:item.price


}



);



}



cart=[];


tampilCart();



document.getElementById("pesanStatus").innerHTML=

"✅ Pesanan berhasil";



};







// ==========================
// ORDER REALTIME
// ==========================


onSnapshot(

collection(db,"orders"),

(snapshot)=>{


let html="";



snapshot.forEach((doc)=>{


let o=doc.data();



html += `


<div class="card">


<h3>

🍽️ ${o.restaurantId}

</h3>



<p>

Pelanggan :
${o.customerName}

</p>



<p>

Meja :
${o.tableNumber}

</p>



<p>

Total :

Rp ${Number(o.totalPrice).toLocaleString()}

</p>



<p>

Status :

<select>


<option>

Pending

</option>


<option>

Proses Masak

</option>


<option>

Siap Disajikan

</option>


<option>

Selesai

</option>


</select>


</p>


</div>


`;



});



document.getElementById("ordersList").innerHTML=html;



}

);





</script>


</body>
</html>
