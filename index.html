<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  doc,
  setDoc,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// FIREBASE CONFIG
const firebaseConfig = {

  apiKey: "AIzaSyD-m7sqOLaZ8-bWLZeGVPTXT-Qp1vQIycQ",

  authDomain: "warung-nusantara-9f331.firebaseapp.com",

  projectId: "warung-nusantara-9f331",

  storageBucket: "warung-nusantara-9f331.firebasestorage.app",

  messagingSenderId: "68513276988",

  appId: "1:68513276988:web:b13b148a51ce216efecf39"

};


// CONNECT FIREBASE
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


console.log("Firebase berhasil:", app.name);



let selectedMenu = null;



// ======================
// TAMPIL MENU
// ======================

async function tampilMenu(){


try{


const menuList = document.getElementById("menuList");


const data = await getDocs(

collection(
db,
"restaurants",
"jombang01",
"menus"

)

);



let html = "";



if(data.empty){

menuList.innerHTML =
"<h3>Menu belum tersedia</h3>";

return;

}



data.forEach((item)=>{


const menu = item.data();



html += `

<div class="card"

onclick="pilihMenu(
'${item.id}',
'${menu.name}',
${menu.price}
)">


<img src="${menu.imageUrl}" >


<div class="card-body">


<h3>
${menu.name}
</h3>


<p>
${menu.category}
</p>


<p class="price">

Rp ${menu.price}

</p>


</div>


</div>


`;



});



menuList.innerHTML = html;



}

catch(error){

console.log("ERROR MENU:",error);

}

}




tampilMenu();




// ======================
// PILIH MENU
// ======================


window.pilihMenu =
(id,name,price)=>{


selectedMenu={

id:id,

name:name,

price:price

};



document.getElementById("menu").value =
name;



document.getElementById("status").innerHTML =
"✅ Menu dipilih : "+name;


};





// ======================
// PESAN
// ======================


window.pesan = async()=>{


try{


if(!selectedMenu){

alert("Pilih menu dulu");

return;

}



const nama =
document.getElementById("nama").value;



const phone =
document.getElementById("phone").value;



const meja =
Number(
document.getElementById("meja").value
);



const qty =
Number(
document.getElementById("jumlah").value
);





// CUSTOMER

const customerID =
"customer_"+Date.now();



await setDoc(

doc(
db,
"customers",
customerID
),

{

name:nama,

phone:phone,

loyaltyPoints:0

}

);





// ORDER


const order = await addDoc(

collection(db,"orders"),

{


customerId:customerID,


restaurantId:
"restaurants/jombang01",


tableNumber:meja,


status:"pending",


totalPrice:
selectedMenu.price * qty,


createdAt:
serverTimestamp()


}


);





// ORDER ITEMS


await addDoc(


collection(

db,

"orders",

order.id,

"orderItems"

),


{


menuId:selectedMenu.id,


menuName:selectedMenu.name,


qty:qty,


unitPrice:selectedMenu.price,


subtotal:selectedMenu.price*qty


}


);



document.getElementById("status").innerHTML =
"✅ Pesanan berhasil";



}

catch(error){


console.log(error);


document.getElementById("status").innerHTML =
"❌ "+error.message;


}


};


</script>
