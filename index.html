<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:linear-gradient(135deg,#ffe4ec,#fff0f5);
color:#5a3038;
}

header{
background:linear-gradient(135deg,#ffb6c1,#ffc0cb);
padding:35px;
text-align:center;
border-radius:0 0 40px 40px;
}

header h1{color:#8b2f4d;font-size:38px;}
header p{margin-top:5px;}

.container{
width:90%;
max-width:1100px;
margin:40px auto;
}

.title{color:#a33b5c;margin-bottom:20px;}

.menu-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{padding:15px;}

.price{color:#e75480;font-weight:bold;margin-top:8px;}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#e75480;
color:white;
cursor:pointer;
font-weight:600;
}

button:hover{background:#c2185b;}

.form-box{
margin-top:40px;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ffc0cb;
outline:none;
}

#status{
margin-top:10px;
color:#e75480;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>🍽️ Warung Nusantara</h1>
<p>Cita rasa nusantara 💗</p>
</header>

<div class="container">

<h2 class="title">Menu Makanan</h2>
<div id="menuList" class="menu-list"></div>

<div class="form-box">
<h2>🛒 Form Pesanan</h2>

<input id="nama" placeholder="Nama">
<input id="phone" placeholder="No HP">
<input id="meja" type="number" placeholder="Nomor Meja">

<input id="menu" readonly placeholder="Menu dipilih">
<input id="jumlah" type="number" value="1">

<button onclick="pesan()">Pesan Sekarang 💗</button>

<p id="status"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
doc,
setDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyD-m7sqOLaZ8b-bWLZEgVPTXT-Qp1vQIycQ",
authDomain: "warung-nusantara-9f331.firebaseapp.com",
projectId: "warung-nusantara-9f331",
storageBucket: "warung-nusantara-9f331.firebasestorage.app",
messagingSenderId: "68513276988",
appId: "1:68513276988:web:b13b148a51ce216efecf39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedMenu = null;

async function loadMenu(){

try{

const snap = await getDocs(
collection(db,"restaurants","jombang01","menus")
);

let makanan = "";
let minuman = "";

snap.forEach(d=>{

const m = d.data();

const card = `
<div class="card">
<img src="${m.imageUrl}">
<div class="card-body">
<h3>${m.name}</h3>
<p>${m.category}</p>
<div class="price">Rp ${Number(m.price).toLocaleString()}</div>

<button onclick="selectMenu('${d.id}','${m.name}',${m.price})">
+ Pesan
</button>

</div>
</div>
`;

if(m.category && m.category.toLowerCase().includes("minum")){
minuman += card;
}else{
makanan += card;
}

});

document.getElementById("menuList").innerHTML = `
<h2>Makanan 🍽️</h2>
<div class="menu-list">${makanan}</div>

<h2 style="margin-top:30px">Minuman 🥤</h2>
<div class="menu-list">${minuman}</div>
`;

}catch(e){
console.log(e);
document.getElementById("menuList").innerHTML =
"Gagal load menu";
}

}
// ================== SELECT MENU ==================
window.selectMenu = (id,name,price)=>{
selectedMenu = {id,name,price};
document.getElementById("menu").value = name;
document.getElementById("status").innerText = "Dipilih: " + name;
}

// ================== PESAN ==================
window.pesan = async ()=>{

if(!selectedMenu){
alert("Pilih menu dulu");
return;
}

const nama = document.getElementById("nama").value;
const phone = document.getElementById("phone").value;
const meja = document.getElementById("meja").value;
const qty = Number(document.getElementById("jumlah").value);

const customerId = "cust_" + Date.now();

await setDoc(doc(db,"customers",customerId),{
name:nama,
phone:phone,
loyaltyPoints:0
});

const orderRef = await addDoc(collection(db,"orders"),{
customerId,
restaurantId:"jombang01",
menuId:selectedMenu.id,
status:"pending",
tableNumber:meja,
totalPrice:selectedMenu.price * qty,
createdAt:serverTimestamp()
});

await addDoc(collection(db,"orders",orderRef.id,"orderItems"),{
menuId:selectedMenu.id,
menuName:selectedMenu.name,
qty,
unitPrice:selectedMenu.price,
subtotal:selectedMenu.price * qty
});

document.getElementById("status").innerText =
"✅ Pesanan berhasil dikirim 💗";
};

</script>

</body>
</html>
