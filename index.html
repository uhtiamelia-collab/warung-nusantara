<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#111;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px 10px;
}

.subtitle{
  color:#ffe7b0;
  font-size:14px;
  opacity:0.9;
}

.info-badge{
  background:rgba(255,255,255,0.15);
  padding:8px 14px;
  border-radius:50px;
  margin:6px auto;
  display:block;
  width:fit-content;
  font-size:13px;
  backdrop-filter: blur(6px);
}

/* CONTAINER */
.container{
  padding:20px;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

button{
  width:100%;
  padding:10px;
  background:#8b5e3c;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<!-- HEADER RAPI -->
<div class="header">
  <h1>🍽️ Warung Nusantara</h1>

  <div class="subtitle">
    ✨ Sistem pemesanan digital - realtime
  </div>

  <div class="info-badge">📍 Alamat: Loading...</div>
  <div class="info-badge">🕒 Buka: 08.00 - 22.00 WIB</div>
</div>

<!-- CONTENT -->
<div class="container">

<h2>Restoran</h2>
<div id="restoInfo" class="card">Loading...</div>

<h2>Menu</h2>
<div id="menuList" class="grid"></div>

<h2>Pesanan</h2>

<input id="nama" placeholder="Nama Customer">
<input id="phone" placeholder="No HP">
<select id="meja"></select>

<div class="card">
<h3>Keranjang</h3>
<div id="cartBox">Kosong</div>
<h3 id="total">Rp 0</h3>
<button onclick="checkout()">Kirim Pesanan</button>
</div>

<h2>📦 Orders</h2>
<div id="ordersList"></div>

</div>

</body>
</html>
