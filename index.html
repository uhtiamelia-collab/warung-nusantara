<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#111;
  color:white;
}

h1{
  text-align:center;
  color:#ffdca8;
  margin-top:20px;
}

.container{
  padding:20px;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

button{
  width:100%;
  padding:10px;
  background:#8b5e3c;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<h1>🍽️ Warung Nusantara</h1>

<div class="container">

<h2>Menu</h2>
<div id="menuList" class="grid"></div>

<h2>Pesanan</h2>

<input id="nama" placeholder="Nama Customer">
<input id="phone" placeholder="No HP">

<select id="meja"></select>

<div class="card">
<h3>Keranjang</h3>
<div id="cartBox">Kosong</div>
<h3 id="total">Rp 0</h3>
<button onclick="checkout()">Kirim Pesanan</button>
</div>

<h2>📦 Orders Real-time</h2>
<div id="ordersList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 GANTI INI PAKAI PUNYAMU */
const firebaseConfig = {
apiKey: "ISI_API_KEY_KAMU",
authDomain: "ISI_AUTH_DOMAIN_KAMU",
projectId: "ISI_PROJECT_ID_KAMU"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart=[];

/* ================= MENU ================= */
async function loadMenu(){
  const snap = await getDocs(collection(db,"menus"));

  let html="";

  snap.forEach(d=>{
    let m=d.data();

    html += `
      <div class="card">
        <h3>${m.name}</h3>
        <p>Rp ${m.price}</p>
        <button onclick="add('${m.name}',${m.price})">Tambah</button>
      </div>
    `;
  });

  document.getElementById("menuList").innerHTML = html || "Menu kosong";
}

window.add = (name,price)=>{
  cart.push({name,price});
  renderCart();
}

/* ================= CART ================= */
function renderCart(){
  let html="";
  let total=0;

  cart.forEach(i=>{
    html += `<p>${i.name} - Rp ${i.price}</p>`;
    total += i.price;
  });

  document.getElementById("cartBox").innerHTML = html || "Kosong";
  document.getElementById("total").innerHTML = "Rp " + total;
}

/* ================= CHECKOUT (CUSTOMER + ORDER) ================= */
window.checkout = async ()=>{

  let nama = document.getElementById("nama").value;
  let phone = document.getElementById("phone").value;

  if(cart.length===0) return alert("Keranjang kosong");
  if(!nama) return alert("Isi nama");

  let total = cart.reduce((a,b)=>a+b.price,0);

  /* 🔥 ORDER */
  await addDoc(collection(db,"orders"),{
    customerName:nama,
    phone:phone,
    status:"Pending",
    totalPrice:total,
    createdAt:new Date()
  });

  /* 🔥 CUSTOMER */
  await addDoc(collection(db,"customers"),{
    name:nama,
    phone:phone,
    lastOrderTotal:total,
    createdAt:new Date()
  });

  cart=[];
  renderCart();

  alert("Pesanan berhasil ✔");
};

/* ================= ORDERS REALTIME ================= */
function loadOrders(){

  onSnapshot(collection(db,"orders"),(snap)=>{

    let html="";

    snap.forEach(d=>{
      let o=d.data();

      html += `
        <div class="card">
          <b>${o.customerName}</b><br>
          Status: ${o.status}<br>
          Total: Rp ${o.totalPrice}
        </div>
      `;
    });

    document.getElementById("ordersList").innerHTML =
      html || "Belum ada orders";
  });
}

/* ================= INIT ================= */
loadMenu();
loadOrders();

</script>

</body>
</html>
