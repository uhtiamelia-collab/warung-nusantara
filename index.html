<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warung Nusantara - Order System</title>
</head>

<body>

  <h2>🍽️ Form Pesanan Warung Nusantara</h2>

  <!-- =========================
       FORM ORDER
  ========================== -->
  <form id="orderForm">

    <input type="text" id="customerName" placeholder="Nama Pelanggan" required />
    <br><br>

    <input type="text" id="phone" placeholder="No HP" />
    <br><br>

    <select id="lokasi">
      <option value="Bojonegoro">Bojonegoro</option>
      <option value="Jombang">Jombang</option>
    </select>
    <br><br>

    <input type="number" id="meja" placeholder="Nomor Meja" />
    <br><br>

    <textarea id="note" placeholder="Catatan (optional)"></textarea>
    <br><br>

    <button type="submit">Kirim Pesanan</button>

  </form>

  <hr>

  <h3>📦 Status Order:</h3>
  <div id="output"></div>

  <!-- =========================
       FIREBASE + LOGIC
  ========================== -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // =========================
    // CONFIG FIREBASE
    // =========================
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById("orderForm");
    const output = document.getElementById("output");

    // =========================
    // SUBMIT ORDER
    // =========================
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      // =========================
      // DATA ORDER LENGKAP
      // =========================
      const orderData = {
        orderId: crypto.randomUUID(),
        orderNumber: "ORD-" + Date.now(),

        customer: {
          name: document.getElementById("customerName").value,
          phone: document.getElementById("phone").value
        },

        restaurant: {
          name: "Warung Nusantara",
          location: document.getElementById("lokasi").value
        },

        table: {
          number: document.getElementById("meja").value || null,
          code: "T" + document.getElementById("meja").value + "-BOJO"
        },

        orderType: "dine-in",

        items: [
          {
            menuId: "menu_001",
            name: "Nasi Rawon",
            qty: 1,
            price: 8000,
            subtotal: 8000
          },
          {
            menuId: "menu_002",
            name: "Es Teh",
            qty: 1,
            price: 3000,
            subtotal: 3000
          }
        ],

        summary: {
          subtotal: 11000,
          grandTotal: 11000
        },

        status: "pending",
        // pending → masak → siap → selesai

        payment: {
          status: "unpaid",
          method: "cash"
        },

        note: document.getElementById("note").value,

        timing: {
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          estimatedMinutes: 15
        }
      };

      try {
        // =========================
        // KIRIM KE FIREBASE
        // =========================
        const docRef = await addDoc(collection(db, "orders"), orderData);

        // =========================
        // OUTPUT DISPLAY
        // =========================
        output.innerHTML = `
          <div style="padding:10px;border:1px solid #000;margin-top:10px;">
            <h3>ORDER BERHASIL</h3>
            <p><b>Order ID:</b> ${docRef.id}</p>
            <p><b>Nama:</b> ${orderData.customer.name}</p>
            <p><b>Meja:</b> ${orderData.table.number}</p>
            <p><b>Lokasi:</b> ${orderData.restaurant.location}</p>

            <hr>

            <p><b>Pesanan:</b></p>
            <ul>
              <li>Nasi Rawon x1 (8000)</li>
              <li>Es Teh x1 (3000)</li>
            </ul>

            <p><b>Total:</b> Rp ${orderData.summary.grandTotal}</p>

            <p><b>Status:</b> 🟡 ${orderData.status}</p>
            <p><b>Payment:</b> ❌ ${orderData.payment.status}</p>
          </div>
        `;

        form.reset();

      } catch (error) {
        console.error(error);
        alert("Gagal kirim pesanan!");
      }
    });

  </script>

</body>
</html>
