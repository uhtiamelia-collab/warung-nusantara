<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  margin:0;
  background:
  linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
  url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1200');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

.overlay{
  min-height:100vh;
  padding:30px;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
  color:#fff;
}

h1{
  text-align:center;
  font-size:42px;
  color:#fff3d4;
  text-shadow:0 0 15px rgba(255,220,150,.5);
}

h2{
  text-align:center;
  color:#ffe7b2;
  margin-top:30px;
}

.card{
  background:rgba(255,248,235,0.95);
  backdrop-filter:blur(10px);
  color:#3b2a1f;
  padding:22px;
  margin:18px 0;
  border-radius:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#c08b5c,#8b5e3c);
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition:.3s;
}

button:hover{
  transform:translateY(-2px);
}

input,select{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:14px;
  border:1px solid #e8d3b9;
  background:#fffaf3;
}

img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:16px;
}

#cartBox p{
  padding:10px;
  background:#fff7eb;
  border-radius:10px;
  margin:6px 0;
}

#total{
  color:#8b5e3c;
}
</style>
</head>

<body>
<div class="overlay">
<div class="container">

<h1>🍽️ Warung Nusantara</h1>

<h2>Pilih Restoran</h2>
<select id="restoSelect"></select>

<div id="restoInfo" class="card"></div>

<h2>Menu</h2>
<div id="menuList" class="grid"></div>

<h2>🛒 Pesanan</h2>
<input id="nama" placeholder="Nama Customer">
<input id="phone" placeholder="Nomor HP">
<select id="meja"></select>

<div class="card">
  <h3>Keranjang</h3>
  <div id="cartBox">Kosong</div>
  <h3 id="total">Total Rp 0</h3>
  <button onclick="checkout()">Kirim Pesanan</button>
</div>

<h2>📦 Data Pesanan</h2>
<div id="ordersList"></div>
