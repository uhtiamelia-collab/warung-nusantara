<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}


body{

    background:#faf3ef;
    color:#3f2b2b;

}


/* HEADER */

header{

    background:
    linear-gradient(
    135deg,
    #f3d6d8,
    #fff1e8
    );

    padding:55px 20px;
    text-align:center;

}


header h1{

    font-size:42px;
    letter-spacing:1px;
    color:#8b4055;

}


header p{

    margin-top:12px;
    color:#70545a;
    font-size:16px;

}





.container{

    width:90%;
    max-width:1200px;
    margin:50px auto;

}



.title{

    font-size:28px;
    color:#8b4055;
    margin-bottom:30px;

}




/* MENU */


.menu-list{


display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:30px;


}




.card{


background:#ffffff;

border-radius:22px;

overflow:hidden;

box-shadow:

0 15px 35px rgba(139,64,85,.12);

transition:.3s;


}



.card:hover{

transform:translateY(-8px);

}




.card img{


width:100%;

height:220px;

object-fit:cover;


}




.card-body{


padding:25px;


}



.card h3{


color:#8b4055;

font-size:21px;

margin-bottom:10px;


}



.card p{


color:#756363;

}




.price{


margin-top:15px;

font-size:18px;

font-weight:600;

color:#c26b86!important;


}





/* FORM */


.form-box{


margin-top:60px;

background:

rgba(255,255,255,.8);


padding:35px;


border-radius:25px;


box-shadow:

0 15px 35px rgba(0,0,0,.08);


}



.form-box h2{


color:#8b4055;

margin-bottom:10px;


}




input{


width:100%;

padding:15px;

margin-top:15px;

border-radius:14px;

border:

1px solid #ead4d2;


background:#fffaf8;

font-size:15px;


}



input:focus{


outline:none;

border-color:#c26b86;


}





button{


width:100%;

padding:15px;

margin-top:20px;

border:none;


border-radius:15px;


background:

linear-gradient(
135deg,
#c26b86,
#9d465f
);


color:white;


font-size:16px;


font-weight:600;


cursor:pointer;


transition:.3s;


}




button:hover{


transform:scale(1.02);

}



#status{


margin-top:20px;

text-align:center;

color:#4d8b55;

font-weight:500;


}



</style>
