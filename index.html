<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#fff0f5;margin:0;color:#5a3038}

header{
background:linear-gradient(135deg,#ffb6c1,#ffc0cb);
padding:30px;
text-align:center;
color:#8b2f4d;
border-radius:0 0 30px 30px;
}

.container{width:90%;max-width:1100px;margin:20px auto}

.card{
background:white;
padding:15px;
border-radius:15px;
margin:10px 0;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

button{
background:#e75480;
color:white;
border:none;
padding:8px;
width:100%;
border-radius:10px;
cursor:pointer;
}

button:hover{background:#c2185b}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ffc0cb;
}

#cartBox{margin-top:10px}
</style>
</head>

<body>

<header>
<h1>🍽️ Warung Nusantara</h1>
<p>Sistem Pemesanan Firestore</p>
</header>

<div class="container">

<h2>Menu</h2>
<div id="menuList" class="menu-grid"></div>

<hr>

<h2>Order System</h2>

<input id="nama" placeholder="Nama">
<input id="phone" placeholder="No HP">
<input id="meja" placeholder="Meja">

<div id="cartBox">Keranjang kosong</div>
<h3 id="total">Total: Rp 0</h3>

<button onclick="checkout()">Kirim Pesanan</button>

<hr>

<h2>Data Pesanan</h2>
<div id="ordersList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
doc,
setDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD....",
authDomain: "warung-nusantara-9f331.firebaseapp.com",
projectId: "warung-nusantara-9f331",
storageBucket: "warung-nusantara-9f331.appspot.com",
messagingSenderId: "68513276988",
appId: "1:68513276988:web:b13b148a51ce216efecf39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let restaurantId = "jombang01";
let cart = [];

// ================= MENU =================
async function loadMenu(){

const snap = await getDocs(collection(db,"restaurants",restaurantId,"menus"));

let html="";

snap.forEach(d=>{

const m = d.data();

html += `
<div class="card">
<h3>${m.name}</h3>
<p>${m.category}</p>
<p>Rp ${m.price}</p>
<button onclick="add('${d.id}','${m.name}',${m.price})">
+ Pesan
</button>
</div>
`;
});

document.getElementById("menuList").innerHTML = html;
}

loadMenu();

// ================= ADD CART =================
window.add = (id,name,price)=>{

cart.push({id,name,price});

renderCart();

};

// ================= CART =================
function renderCart(){

let html="";
let total=0;

cart.forEach((c,i)=>{
total += c.price;
html += `<p>${c.name} - Rp ${c.price}</p>`;
});

document.getElementById("cartBox").innerHTML = html || "Keranjang kosong";
document.getElementById("total").innerText = "Total: Rp " + total;

}

// ================= CHECKOUT =================
window.checkout = async ()=>{

if(cart.length===0) return alert("Keranjang kosong");

const nama = document.getElementById("nama").value;
const phone = document.getElementById("phone").value;
const meja = document.getElementById("meja").value;

let total = cart.reduce((a,b)=>a+b.price,0);

const orderRef = await addDoc(collection(db,"orders"),{
restaurantId,
customerName:nama,
phone,
tableNumber:meja,
status:"Pending",
totalPrice:total,
createdAt:serverTimestamp()
});

for(let item of cart){

await addDoc(collection(db,"orders",orderRef.id,"items"),{
menuName:item.name,
price:item.price
});

}

cart=[];

renderCart();

loadOrders();

alert("Pesanan berhasil dikirim");

};

// ================= ORDERS =================
async function loadOrders(){

const snap = await getDocs(collection(db,"orders"));

let html="";

snap.forEach(d=>{

const o = d.data();

if(o.restaurantId !== restaurantId) return;

html += `
<div class="card">
<h3>Meja ${o.tableNumber}</h3>
<p>${o.customerName}</p>
<p>Total: Rp ${o.totalPrice}</p>
<p>Status: ${o.status}</p>
</div>
`;
});

document.getElementById("ordersList").innerHTML = html;
}

loadOrders();

</script>

</body>
</html>
