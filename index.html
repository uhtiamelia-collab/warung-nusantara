<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warung Nusantara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

margin:0;
background:#fff0f5;
color:#5a3038;

}


header{

background:linear-gradient(135deg,#ffb6c1,#ffc0cb);

padding:35px;

text-align:center;

border-radius:0 0 40px 40px;

}



.container{

width:90%;

max-width:1100px;

margin:30px auto;

}



.card{

background:white;

padding:20px;

border-radius:20px;

margin:15px 0;

box-shadow:0 5px 20px rgba(0,0,0,.1);

}



.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}



img{

width:100%;

height:200px;

object-fit:cover;

border-radius:15px;

}



button{

width:100%;

padding:12px;

background:#e75480;

color:white;

border:0;

border-radius:15px;

cursor:pointer;

}



input,select{

width:100%;

padding:12px;

margin:8px 0;

border-radius:10px;

border:1px solid pink;

}



#ordersList{

max-height:400px;

overflow-y:auto;

}



/* MODAL */


.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.5);

align-items:center;

justify-content:center;

}


.modal.active{

display:flex;

}


.modal-box{

background:white;

padding:30px;

border-radius:20px;

width:90%;

max-width:400px;

}



.modal-btn{

display:flex;

gap:10px;

}


</style>


</head>



<body>


<header>

<h1>🍽️ Warung Nusantara</h1>

<p>Sistem Pemesanan Digital Firestore</p>

</header>



<!-- MODAL CUSTOMER -->

<div class="modal" id="modalCustomer">

<div class="modal-box">

<h3>👤 Tambah Customer</h3>


<input id="custName" placeholder="Nama Customer">


<input id="custPhone" placeholder="Nomor HP">


<p id="modalStatus"></p>


<div class="modal-btn">

<button onclick="simpanCustomer()">

💾 Simpan

</button>


<button onclick="tutupModal()">

Batal

</button>


</div>


</div>

</div>



<div class="container">



<h2>Pilih Lokasi Restoran</h2>


<select id="restoSelect" onchange="gantiRestoran()"></select>



<div class="card" id="restoInfo">

Loading...

</div>



<h2>Menu</h2>


<div id="menuList" class="grid"></div>




<h2>🛒 Pesanan</h2>


<button onclick="bukaModal()">

+ Tambah Customer

</button>



<select id="customerSelect">

<option>

-- Customer --

</option>

</select>



<input id="nama" placeholder="Nama Customer">


<input id="phone" placeholder="Nomor HP">


<input id="meja" placeholder="Nomor Meja">



<div class="card">


<h3>Keranjang</h3>


<div id="cartBox">

Kosong

</div>


<h3 id="total">

Total Rp 0

</h3>



<button onclick="checkout()">

Kirim Pesanan

</button>


<p id="pesanStatus"></p>


</div>




<h2>📦 Data Pesanan</h2>


<div id="ordersList"></div>



</div>





<script type="module">


import {initializeApp}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,

collection,

getDocs,

addDoc,

onSnapshot,

serverTimestamp,

doc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig={


apiKey:"AIzaSyD-m7sqOLaZ8-bWLZeGVPTXT-Qp1vQIycQ",

authDomain:"warung-nusantara-9f331.firebaseapp.com",

projectId:"warung-nusantara-9f331",

storageBucket:"warung-nusantara-9f331.firebasestorage.app",

messagingSenderId:"68513276988",

appId:"1:68513276988:web:b13b148a51ce216efecf39"


};



const app=initializeApp(firebaseConfig);


const db=getFirestore(app);



let restaurantId="jombang01";

let restoran={};

let cart=[];
// ===============================
// LOAD RESTORAN
// ===============================

async function loadRestoran(){


const snap = await getDocs(
collection(db,"restaurants")
);



let html="";



snap.forEach(doc=>{


let r=doc.data();


restoran[doc.id]=r;



html += `

<option value="${doc.id}">

${r.name}

</option>

`;


});



document.getElementById("restoSelect").innerHTML=html;



// DEFAULT JOMBANG

if(restoran["jombang01"]){

restaurantId="jombang01";

document.getElementById("restoSelect").value="jombang01";

}



tampilRestoran();

loadMenu();

loadCustomer();

loadOrders();



}



loadRestoran();




// ===============================
// GANTI RESTORAN
// ===============================


window.gantiRestoran=function(){



restaurantId =
document.getElementById("restoSelect").value;



cart=[];


renderCart();


tampilRestoran();


loadMenu();


loadCustomer();


loadOrders();


}






// ===============================
// INFO RESTORAN
// ===============================


function tampilRestoran(){


let r=restoran[restaurantId];


if(!r)return;



document.getElementById("restoInfo").innerHTML=`

<h2>

🍽️ ${r.name}

</h2>


<p>

📍 ${r.address || "-"}

</p>


<p>

🕒 ${r.openHour || "08:00 - 21:00"}

</p>


<p>

Status :

<b>

${r.status || "Buka"}

</b>

</p>


`;



}





// ===============================
// LOAD MENU
// ===============================


async function loadMenu(){



let snap = await getDocs(

collection(

db,

"restaurants",

restaurantId,

"menus"

)

);



let html="";



snap.forEach(doc=>{


let m=doc.data();




// perbaikan harga rawon

let harga = Number(

m.price ||

m.harga ||

m.priceMenu ||

m.Harga ||

0

);




// perbaikan gambar

let gambar =

m.imageUrl ||

m.image ||

m.photo ||

m.gambar ||

"https://via.placeholder.com/300";




html+=`

<div class="card">


<img src="${gambar}"

onerror="this.src='https://via.placeholder.com/300'">


<h3>

${m.name}

</h3>


<p>

${m.category || "Menu"}

</p>



<p>

Rp ${harga.toLocaleString("id-ID")}

</p>


<button onclick="tambah('${m.name}',${harga})">

+ Pesan

</button>


</div>


`;



});



document.getElementById("menuList").innerHTML =

html || "Menu kosong";



}







// ===============================
// KERANJANG
// ===============================


window.tambah=function(name,price){


let ada = cart.find(

x=>x.name==name

);



if(ada){

ada.qty++;

}

else{


cart.push({

name,

price,

qty:1

});


}



renderCart();


}




function renderCart(){



let html="";

let totalHarga=0;



cart.forEach(item=>{


let subtotal=item.price*item.qty;


totalHarga+=subtotal;



html+=`

<p>

${item.name}

x ${item.qty}

=

Rp ${subtotal.toLocaleString("id-ID")}

</p>


`;



});



document.getElementById("cartBox").innerHTML=

html || "Kosong";



document.getElementById("total").innerHTML=

"Total Rp "+totalHarga.toLocaleString("id-ID");



}





// ===============================
// MODAL CUSTOMER
// ===============================


window.bukaModal=function(){


document

.getElementById("modalCustomer")

.classList.add("active");


}



window.tutupModal=function(){


document

.getElementById("modalCustomer")

.classList.remove("active");


}




// ===============================
// SIMPAN CUSTOMER
// ===============================


window.simpanCustomer=async function(){



let nama =

document.getElementById("custName").value.trim();



let hp =

document.getElementById("custPhone").value.trim();




if(nama=="" || hp==""){


modalStatus.innerHTML=

"Nama dan HP wajib";


return;


}



try{


await addDoc(

collection(

db,

"restaurants",

restaurantId,

"customers"

),


{


name:nama,

phone:hp,

createdAt:serverTimestamp()


}


);



modalStatus.innerHTML=

"✅ Berhasil disimpan";



setTimeout(()=>{


tutupModal();


loadCustomer();



},1000);



}

catch(e){


console.log(e);


modalStatus.innerHTML=

"❌ Gagal menyimpan";


}



}





// ===============================
// CUSTOMER DROPDOWN
// ===============================


async function loadCustomer(){



let snap = await getDocs(

collection(

db,

"restaurants",

restaurantId,

"customers"

)

);



let html=

`

<option>

-- Pilih Customer --

</option>

`;



snap.forEach(doc=>{


let c=doc.data();



html+=`

<option

data-name="${c.name}"

data-phone="${c.phone}"

>

${c.name}

-

${c.phone}

</option>

`;



});



document.getElementById("customerSelect").innerHTML=html;



}



customerSelect.onchange=function(){


let data=this.options[this.selectedIndex];


nama.value=data.dataset.name || "";


phone.value=data.dataset.phone || "";
}
// ===============================
// CHECKOUT PESANAN
// ===============================

window.checkout = async function(){


if(cart.length==0){

alert("Pilih menu dulu");

return;

}


let total =
cart.reduce(
(a,b)=>a+(b.price*b.qty),
0
);



await addDoc(

collection(
db,
"restaurants",
restaurantId,
"orders"
),


{

restaurantId:restaurantId,

customerName:nama.value,

phone:phone.value,

tableNumber:meja.value,


items:cart,


totalPrice:total,


status:"Pending",


createdAt:serverTimestamp()


}

);



cart=[];


renderCart();


pesanStatus.innerHTML=
"✅ Pesanan berhasil";



loadOrders();


}







// ===============================
// LOAD ORDER SESUAI RESTORAN
// ===============================


function loadOrders(){



onSnapshot(

collection(
db,
"restaurants",
restaurantId,
"orders"
),


(snapshot)=>{


let html="";



snapshot.forEach(doc=>{


let o=doc.data();



html+=`

<div class="card">


<h3>

👤 ${o.customerName}

</h3>



<p>

📞 ${o.phone}

</p>


<p>

🍽️ Restoran :

${restoran[restaurantId].name}

</p>


<p>

🪑 Meja :

${o.tableNumber}

</p>


<h3>

Rp ${Number(o.totalPrice)
.toLocaleString("id-ID")}

</h3>



<p>

Status :

${o.status}

</p>



</div>


`;


});



document.getElementById("ordersList").innerHTML=

html || "Belum ada pesanan";


}


);


}
