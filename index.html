<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  margin:0;
  background:url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1200') center/cover fixed;
}

h1{
  text-align:center;
  color:#ffe7b0;
  margin-top:20px;
}

.resto-card{
  background:rgba(255,255,255,0.15);
  padding:15px;
  border-radius:15px;
  margin:10px auto;
  width:90%;
  max-width:500px;
  color:white;
  text-align:center;
  backdrop-filter: blur(8px);
}

.overlay{
  background:rgba(0,0,0,.65);
  min-height:100vh;
  padding:25px;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
  color:white;
}

h2{
  text-align:center;
  color:#ffdca8;
}

.card{
  background:rgba(255,248,235,.96);
  color:#2b1e14;
  padding:18px;
  margin:15px 0;
  border-radius:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#8b5e3c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#a06b44;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:12px;
}

.status{
  font-weight:bold;
  color:#8b5e3c;
}
</style>
</head>

<body>

<h1>🍽️ Warung Nusantara</h1>

<div id="restoInfo" class="resto-card">Loading...</div>

<div class="overlay">
<div class="container">

<h2>Menu</h2>
<div id="menuList" class="grid"></div>

<h2>Pesanan</h2>

<input id="nama" placeholder="Nama Customer">
<input id="phone" placeholder="No HP">
<select id="meja"></select>

<div class="card">
<h3>Keranjang</h3>
<div id="cartBox">Kosong</div>
<h3 id="total">Total Rp 0</h3>
<button onclick="checkout()">Kirim Pesanan</button>
</div>

<h2>📦 Orders Real-time</h2>
<div id="ordersList"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  serverTimestamp,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-m7sqOLaZ8bWLZeGVPTXT-Qp1vQIycQ",
  authDomain: "warung-nusantara-9f331.firebaseapp.com",
  projectId: "warung-nusantara-9f331",
  storageBucket: "warung-nusantara-9f331.firebasestorage.app",
  messagingSenderId: "68513276988",
  appId: "1:68513276988:web:b13b148a51ce216efecf39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart=[];
let unsubscribe;

/* MEJA */
function loadMeja(){
  let html='<option value="">Pilih Meja</option>';
  for(let i=1;i<=20;i++){
    html += `<option value="${i}">Meja ${i}</option>`;
  }
  document.getElementById("meja").innerHTML=html;
}
loadMeja();

/* MENU */
async function loadMenu(){
  const snap = await getDocs(collection(db,"menus"));

  let html="";

  snap.forEach(d=>{
    let m=d.data();

    html += `
    <div class="card">
      <h3>${m.name}</h3>
      <p>${m.category}</p>
      <p>Rp ${m.price.toLocaleString("id-ID")}</p>
      <button onclick="add('${m.name}',${m.price})">+ Pesan</button>
    </div>
    `;
  });

  document.getElementById("menuList").innerHTML=html;
}

window.add = (name,price)=>{
  cart.push({name,price});
  renderCart();
}

function renderCart(){
  let html="";
  let total=0;

  cart.forEach(i=>{
    html += `<p>${i.name} - Rp ${i.price}</p>`;
    total += i.price;
  });

  document.getElementById("cartBox").innerHTML=html || "Kosong";
  document.getElementById("total").innerHTML="Total Rp "+total.toLocaleString("id-ID");
}

/* CHECKOUT + CUSTOMER MASUK DATABASE */
window.checkout = async ()=>{

  let nama = document.getElementById("nama").value;
  let phone = document.getElementById("phone").value;
  let meja = document.getElementById("meja").value;

  if(cart.length===0) return alert("Keranjang kosong");
  if(!nama || !meja) return alert("Isi data dulu");

  let total = cart.reduce((a,b)=>a+b.price,0);

  // 🔥 SIMPAN ORDER + CUSTOMER SEKALIGUS
  const orderRef = await addDoc(collection(db,"orders"),{
    customerName: nama,
    phone: phone,
    tableNumber: Number(meja),
    status: "Pending",
    totalPrice: total,
    createdAt: serverTimestamp()
  });

  for(let i of cart){
    await addDoc(collection(db,"orders",orderRef.id,"items"),{
      menuName:i.name,
      qty:1,
      price:i.price
    });
  }

  cart=[];
  renderCart();

  alert("Pesanan masuk ✔");
};

/* ORDERS REALTIME */
function loadOrders(){

  if(unsubscribe) unsubscribe();

  const q = collection(db,"orders");

  unsubscribe = onSnapshot(q,(snapshot)=>{

    let html="";

    snapshot.forEach((d)=>{

      let o = d.data();

      html += `
      <div class="card">
        <h3>Meja ${o.tableNumber}</h3>
        <p><b>Customer:</b> ${o.customerName}</p>
        <p><b>Phone:</b> ${o.phone}</p>
        <p><b>Status:</b> ${o.status}</p>
        <p><b>Total:</b> Rp ${o.totalPrice.toLocaleString("id-ID")}</p>

        <button onclick="changeStatus('${d.id}','Selesai')">
          Tandai Selesai
        </button>
      </div>
      `;
    });

    document.getElementById("ordersList").innerHTML =
      html || "Belum ada pesanan";
  });
}

window.changeStatus = async(id,status)=>{
  await updateDoc(doc(db,"orders",id),{status});
};

loadMenu();
loadOrders();

</script>

</body>
</html>
