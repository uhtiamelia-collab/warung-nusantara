<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warung Nusantara</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}


body{

background:#fff0f5;
color:#5a3038;

}



header{

background:linear-gradient(135deg,#ffb6c1,#ffc0cb);

padding:40px;

text-align:center;

border-radius:0 0 40px 40px;

}



header h1{

color:#8b2f4d;

font-size:40px;

}



header p{

margin-top:10px;

}



.container{

width:90%;

max-width:1100px;

margin:40px auto;

}




.title{

color:#a33b5c;

margin-bottom:20px;

}




.menu-list{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}





.card{

background:white;

border-radius:25px;

overflow:hidden;

box-shadow:0 10px 30px rgba(200,100,130,.2);

cursor:pointer;

transition:.3s;

}



.card:hover{

transform:translateY(-8px);

}




.card img{

width:100%;

height:220px;

object-fit:cover;

}




.card-body{

padding:20px;

}



.card h3{

color:#a33b5c;

}



.price{

margin-top:10px;

font-weight:bold;

color:#e75480;

}




.form-box{

margin-top:50px;

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 10px 30px rgba(200,100,130,.2);

}




input,button{

width:100%;

padding:15px;

margin-top:15px;

border-radius:15px;

border:1px solid #ffc0cb;

}



button{

background:#e75480;

color:white;

border:none;

font-size:16px;

cursor:pointer;

}



button:hover{

background:#c2185b;

}



#status{

margin-top:20px;

text-align:center;

color:#e75480;

font-weight:bold;

}


</style>

</head>


<body>



<header>

<h1>
🍽️ Warung Nusantara
</h1>

<p>
Cita rasa nusantara dalam setiap hidangan 💗
</p>


</header>



<div class="container">


<h2 class="title">
Menu Restoran
</h2>


<div id="menuList" class="menu-list">

</div>




<div class="form-box">


<h2>
🛒 Form Pemesanan
</h2>



<input id="nama"
placeholder="Nama Customer">



<input id="phone"
placeholder="Nomor HP">



<input id="meja"
type="number"
placeholder="Nomor Meja">



<input id="menu"
placeholder="Pilih Menu"
readonly>



<input id="jumlah"
type="number"
value="1">



<button onclick="pesan()">

Pesan Sekarang 💗

</button>



<p id="status"></p>



</div>


</div>






<script type="module">


import { initializeApp } 
from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getFirestore,

collection,

getDocs,

addDoc,

doc,

setDoc,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";






const firebaseConfig = {


apiKey: "AIzaSyD-m7sqOLaZ8-bWLZEgVPTXT-Qp1vQIycQ",

authDomain: "warung-nusantara-9f331.firebaseapp.com",

projectId: "warung-nusantara-9f331",

storageBucket: "warung-nusantara-9f331.firebasestorage.app",

messagingSenderId: "68513276988",

appId: "1:68513276988:web:b13b148a51ce216efecf39"

};





const app = initializeApp(firebaseConfig);


const db = getFirestore(app);



let selectedMenu=null;






// ======================
// TAMPIL SEMUA MENU
// ======================


async function tampilMenu(){


let html="";



const restoran = await getDocs(

collection(db,"restaurants")

);



for(const resto of restoran.docs){



const menus = await getDocs(

collection(

db,

"restaurants",

resto.id,

"menus"

)

);



menus.forEach((item)=>{


const menu=item.data();



html += `


<div class="card"

onclick="pilihMenu(
'${item.id}',
'${menu.name}',
${menu.price}
)">


<img src="${menu.imageUrl}">



<div class="card-body">


<h3>${menu.name}</h3>


<p>
${menu.category}
</p>


<p class="price">

Rp ${menu.price}

</p>



<small>
${resto.id}
</small>



</div>


</div>


`;


});


}



document.getElementById("menuList").innerHTML=html;


}



tampilMenu();







// PILIH MENU


window.pilihMenu=(id,name,price)=>{


selectedMenu={

id,

name,

price

};


document.getElementById("menu").value=name;



document.getElementById("status").innerHTML=

"💗 Dipilih : "+name;


};







// ======================
// SIMPAN ORDER
// ======================


window.pesan=async()=>{


try{


if(!selectedMenu){

alert("Pilih menu dulu");

return;

}



const nama=document.getElementById("nama").value;

const phone=document.getElementById("phone").value;

const meja=Number(document.getElementById("meja").value);

const qty=Number(document.getElementById("jumlah").value);




// CUSTOMER


const customerID="customer_"+Date.now();



await setDoc(

doc(db,"customers",customerID),

{

name:nama,

phone:phone,

loyaltyPoints:0

}

);





// ORDER


const order=await addDoc(

collection(db,"orders"),

{

customerId:customerID,

restaurantId:selectedMenu.id,

tableNumber:meja,

status:"pending",

totalPrice:selectedMenu.price*qty,

createdAt:serverTimestamp()

}

);






// ITEM


await addDoc(

collection(

db,

"orders",

order.id,

"orderItems"

),

{


menuId:selectedMenu.id,

menuName:selectedMenu.name,

qty:qty,

unitPrice:selectedMenu.price,

subtotal:selectedMenu.price*qty


}

);





document.getElementById("status").innerHTML=

"✅ Pesanan berhasil 💗";


}

catch(e){

console.log(e);

}

};


</script>


</body>

</html>
