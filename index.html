<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warung Nusantara</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.form-box{
  background: rgba(255,255,255,0.1);
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
  backdrop-filter: blur(10px);
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

.menu-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background: rgba(255,255,255,0.1);
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{ transform:scale(1.05); }

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{ padding:10px; }

.price{ color:#00ffcc; font-weight:bold; }

button{
  width:100%;
  padding:8px;
  border:none;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

.order-box{
  margin-top:20px;
  padding:15px;
  background: rgba(255,255,255,0.1);
  border-radius:10px;
}

.status{
  padding:5px 10px;
  border-radius:8px;
  display:inline-block;
  font-size:12px;
  margin-top:10px;
}

.pending{background:orange;}
.masak{background:blue;}
.siap{background:green;}
.selesai{background:gray;}
</style>
</head>

<body>

<div class="header">🍽️ WARUNG NUSANTARA</div>

<div class="container">

<!-- =========================
     FORM INFO CUSTOMER
========================= -->
<div class="form-box">
  <input id="nama" placeholder="Nama Pelanggan">
  <input id="meja" placeholder="Nomor Meja">
  
  <select id="lokasi">
    <option>Bojonegoro</option>
    <option>Jombang</option>
  </select>
</div>

<!-- MENU -->
<div class="menu-grid" id="menu"></div>

<!-- ORDER OUTPUT -->
<div class="order-box" id="orderBox">
  <h3>📦 Order Kamu</h3>
  <p>Belum ada pesanan</p>
</div>

</div>

<script>
const menus = [
  {name:"Nasi Rawon",price:8000,img:"https://raw.githubusercontent.com/uhtiamelia-collab/warung-nusantara/main/images/Nasi%20Rawon.jpg"},
  {name:"Nasi Padang",price:25000,img:"https://raw.githubusercontent.com/uhtiamelia-collab/warung-nusantara/main/images/Nasi%20padang.jpg"},
  {name:"Matcha Latte",price:15000,img:"https://raw.githubusercontent.com/uhtiamelia-collab/warung-nusantara/main/images/Matcha%20Latte.jpg"},
  {name:"Soto Ayam",price:20000,img:"https://raw.githubusercontent.com/uhtiamelia-collab/warung-nusantara/main/images/soto.jpg"},
  {name:"Jus Alpukat",price:11000,img:"https://raw.githubusercontent.com/uhtiamelia-collab/warung-nusantara/main/images/Jus%20Alpukat.jpeg"}
];

let cart = [];

const menuContainer = document.getElementById("menu");

menus.forEach((m,i)=>{
  menuContainer.innerHTML += `
    <div class="card">
      <img src="${m.img}">
      <div class="card-body">
        <h4>${m.name}</h4>
        <p class="price">Rp ${m.price}</p>
        <button onclick="add(${i})">Tambah</button>
      </div>
    </div>
  `;
});

function add(i){
  cart.push(menus[i]);
  render();
}

function render(){

  const nama = document.getElementById("nama").value || "-";
  const meja = document.getElementById("meja").value || "-";
  const lokasi = document.getElementById("lokasi").value;

  let total = cart.reduce((a,b)=>a+b.price,0);

  let html = `
    <h3>📦 Detail Order</h3>
    <p><b>Nama:</b> ${nama}</p>
    <p><b>Meja:</b> ${meja}</p>
    <p><b>Lokasi:</b> ${lokasi}</p>
    <hr>
  `;

  cart.forEach(c=>{
    html += `<p>🍽️ ${c.name} - Rp ${c.price}</p>`;
  });

  html += `
    <hr>
    <h3>Total: Rp ${total}</h3>

    <p>Status:</p>
    <span class="status pending">PENDING</span>
    <span class="status masak">MASAK</span>
    <span class="status siap">SIAP</span>
    <span class="status selesai">SELESAI</span>
  `;

  document.getElementById("orderBox").innerHTML = html;
}
</script>

</body>
</html>
