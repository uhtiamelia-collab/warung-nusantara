<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyD-m7sqOLaZ8bWLZEgVPTXT-Qp1vQIycQ",
  authDomain: "warung-nusantara-9f331.firebaseapp.com",
  projectId: "warung-nusantara-9f331",
  storageBucket: "warung-nusantara-9f331.appspot.com",
  messagingSenderId: "68513276988",
  appId: "1:68513276988:web:b13b148a51ce216efecf39"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedMenu = null;

// =====================
// LOAD MENU (FIX + CLICK SELECT)
// =====================
async function tampilMenu() {
  const snapshot = await getDocs(
    collection(db, "restaurants", "jombang01", "menus")
  );

  let html = "";

  snapshot.forEach((docItem) => {
    const menu = docItem.data();

    html += `
      <div class="card" onclick="pilihMenu('${docItem.id}', '${menu.name}', ${menu.price})">

        <img src="${menu.imageUrl || 'https://via.placeholder.com/300'}">

        <div class="card-body">
          <h3>${menu.name || '-'}</h3>
          <p>${menu.category || '-'}</p>
          <p class="price">Rp ${menu.price || 0}</p>
        </div>

      </div>
    `;
  });

  document.getElementById("menuList").innerHTML = html;
}

tampilMenu();


// =====================
// PILIH MENU
// =====================
window.pilihMenu = (id, name, price) => {
  selectedMenu = { id, name, price };

  document.getElementById("menu").value = name;

  document.getElementById("status").innerHTML =
    `📌 Menu dipilih: ${name} - Rp ${price}`;
};


// =====================
// ORDER FUNCTION (FIXED TOTAL PRICE)
// =====================
window.pesan = async () => {
  try {
    if (!selectedMenu) {
      alert("Pilih menu dulu!");
      return;
    }

    const nama = document.getElementById("nama").value;
    const phone = document.getElementById("phone").value;
    const meja = Number(document.getElementById("meja").value);
    const qty = Number(document.getElementById("jumlah").value);

    const customerID = "customer_" + Date.now();

    // CUSTOMER
    await setDoc(doc(db, "customers", customerID), {
      name: nama,
      phone: phone,
      loyaltyPoints: 0
    });

    // ORDER
    const orderRef = await addDoc(collection(db, "orders"), {
      customerId: customerID,
      restaurantId: "restaurants/jombang01",
      tableNumber: meja,
      status: "pending",
      totalPrice: selectedMenu.price * qty,
      createdAt: serverTimestamp()
    });

    // ORDER ITEMS
    await addDoc(
      collection(db, "orders", orderRef.id, "orderItems"),
      {
        menuId: selectedMenu.id,
        menuName: selectedMenu.name,
        qty: qty,
        unitPrice: selectedMenu.price,
        subtotal: selectedMenu.price * qty
      }
    );

    document.getElementById("status").innerHTML =
      "✅ Pesanan berhasil disimpan";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerHTML =
      "❌ Error: " + err.message;
  }
};
</script>
