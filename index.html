<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warung Nusantara</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

margin:0;
background:#fff0f5;
color:#5a3038;

}



header{

background:linear-gradient(135deg,#ffb6c1,#ffc0cb);

padding:35px;

text-align:center;

color:#8b2f4d;

border-radius:0 0 40px 40px;

}



.container{

width:90%;
max-width:1100px;

margin:30px auto;

}



.card{

background:white;

padding:20px;

border-radius:20px;

margin:15px 0;

box-shadow:0 5px 20px rgba(0,0,0,.1);

}



.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}



img{

width:100%;

height:200px;

object-fit:cover;

border-radius:15px;

}



button{

width:100%;

padding:12px;

background:#e75480;

color:white;

border:none;

border-radius:15px;

cursor:pointer;

}



button:hover{

background:#c2185b;

}



input,select{

width:100%;

padding:12px;

margin:8px 0;

border-radius:10px;

border:1px solid pink;

}



.status{

color:#e75480;

font-weight:bold;

}



/* SCROLL DATA PESANAN */

#ordersList{

max-height:450px;

overflow-y:auto;

padding:10px;

}




</style>


</head>


<body>


<header>

<h1>🍽️ Warung Nusantara</h1>

<p>Sistem Pemesanan Digital Firestore</p>

</header>



<div class="container">



<h2>Pilih Lokasi Restoran</h2>



<select id="restoSelect" onchange="gantiRestoran()">


</select>




<div class="card" id="restoInfo">


</div>





<h2>Menu</h2>


<div id="menuList" class="grid"></div>





<h2>🛒 Pesanan</h2>



<input id="nama" placeholder="Nama Customer">


<input id="phone" placeholder="Nomor HP">


<input id="meja" placeholder="Nomor Meja">





<div class="card">


<h3>Keranjang</h3>


<div id="cartBox">

Kosong

</div>


<h3 id="total">

Total Rp 0

</h3>



<button onclick="checkout()">

Kirim Pesanan

</button>



<p id="pesanStatus" class="status"></p>



</div>







<h2>📦 Data Pesanan</h2>


<div id="ordersList"></div>





</div>






<script type="module">


import {initializeApp}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getFirestore,

collection,

getDocs,

addDoc,

serverTimestamp,

onSnapshot,

doc,

updateDoc


}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig={


apiKey:"AIzaSyD-m7sqOLaZ8-bWLZeGVPTXT-Qp1vQIycQ",

authDomain:"warung-nusantara-9f331.firebaseapp.com",

projectId:"warung-nusantara-9f331",

storageBucket:"warung-nusantara-9f331.firebasestorage.app",

messagingSenderId:"68513276988",

appId:"1:68513276988:web:b13b148a51ce216efecf39"


};





const app=initializeApp(firebaseConfig);


const db=getFirestore(app);





// DEFAULT JOMBANG


let restaurantId="jombang01";


let restoran={};


let cart=[];





// =========================
// LOAD RESTORAN
// =========================


async function loadRestoran(){



let snap = await getDocs(

collection(db,"restaurants")

);



let html="";



snap.forEach(d=>{


let r=d.data();


restoran[d.id]=r;



html+=`

<option value="${d.id}">

${r.name}

</option>


`;



});



document.getElementById("restoSelect").innerHTML=html;



// langsung JOMBANG


document.getElementById("restoSelect").value="jombang01";



tampilRestoran();


loadMenu();


loadOrders();


}





loadRestoran();







// =========================
// GANTI RESTORAN
// =========================


window.gantiRestoran=function(){


restaurantId =

document.getElementById("restoSelect").value;



cart=[];

renderCart();



tampilRestoran();


loadMenu();


};








// =========================
// INFO RESTORAN
// =========================


function tampilRestoran(){



let r=restoran[restaurantId];



document.getElementById("restoInfo").innerHTML=`

<h2>

🍽️ ${r.name}

</h2>



<p>

📍 ${r.address}

</p>



<p>

🕒 ${r.openHour || "08:00 - 21:00"}

</p>



<p>

Status :

<b>

${r.status || "Buka"}

</b>

</p>


`;



}










// =========================
// MENU
// =========================


async function loadMenu(){


let snap = await getDocs(

collection(

db,

"restaurants",

restaurantId,

"menus"

)

);



let html="";



snap.forEach(d=>{


let m=d.data();



let harga = Number(

m.price ??

m.harga ??

0

);



let gambar =

m.imageUrl ??

m.image ??

"https://via.placeholder.com/300";




html+=`

<div class="card">


<img src="${gambar}">



<h3>

${m.name}

</h3>



<p>

${m.category}

</p>



<p>

Rp ${harga.toLocaleString()}

</p>




<button onclick="tambah('${m.name}',${harga})">

+ Pesan

</button>



</div>


`;



});



document.getElementById("menuList").innerHTML=html;


}








// =========================
// CART
// =========================



window.tambah=function(name,price){


cart.push({

name,

price

});



renderCart();


};





function renderCart(){



let html="";

let total=0;



cart.forEach(x=>{


html+=`

<p>

${x.name}

Rp ${x.price.toLocaleString()}

</p>


`;



total+=x.price;


});



cartBox.innerHTML=

html || "Kosong";



total.innerHTML=

"Total Rp "+total.toLocaleString();


}








// =========================
// CHECKOUT
// =========================



window.checkout=async()=>{


if(cart.length==0){

alert("Pilih menu dulu");

return;

}



let totalHarga = cart.reduce(

(a,b)=>a+b.price,

0

);




let order=await addDoc(

collection(db,"orders"),

{


restaurantId,


customerName:nama.value,


phone:phone.value,


tableNumber:meja.value,


status:"Pending",


totalPrice:totalHarga,


createdAt:serverTimestamp()


}

);





for(let x of cart){



await addDoc(

collection(

db,

"orders",

order.id,

"items"

),


{

menuName:x.name,

price:x.price

}


);



}



cart=[];


renderCart();



pesanStatus.innerHTML=

"✅ Pesanan berhasil";


};










// =========================
// REALTIME ORDER
// =========================



function loadOrders(){



onSnapshot(

collection(db,"orders"),

snap=>{



let html="";



snap.forEach(d=>{


let o=d.data();



if(o.restaurantId != restaurantId)

return;




html+=`

<div class="card">


<h3>

${o.customerName}

</h3>



<p>

Restoran : ${o.restaurantId}

</p>



<p>

Meja : ${o.tableNumber}

</p>



<p>

Total : Rp ${Number(o.totalPrice).toLocaleString()}

</p>



<p>

Status :



<select onchange="ubahStatus('${d.id}',this.value)">



<option ${o.status=="Pending"?"selected":""}>

Pending

</option>



<option ${o.status=="Proses Masak"?"selected":""}>

Proses Masak

</option>




<option ${o.status=="Siap Disajikan"?"selected":""}>

Siap Disajikan

</option>



<option ${o.status=="Selesai"?"selected":""}>

Selesai

</option>



</select>



</p>


</div>


`;



});




ordersList.innerHTML=html;



}

);



}





window.ubahStatus=async(id,status)=>{


await updateDoc(

doc(db,"orders",id),

{

status

}

);


};





</script>


</body>

</html>
