<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warung Nusantara</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>


*{
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

margin:0;
background:#fff0f5;
color:#5a3038;

}



header{

background:linear-gradient(135deg,#ffb6c1,#ffc0cb);

padding:35px;

text-align:center;

color:#8b2f4d;

border-radius:0 0 40px 40px;

}



.container{

width:90%;
max-width:1100px;

margin:30px auto;

}



.card{

background:white;

padding:20px;

border-radius:20px;

margin:15px 0;

box-shadow:0 5px 20px rgba(0,0,0,.1);

}



.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}



img{

width:100%;

height:200px;

object-fit:cover;

border-radius:15px;

}



button{

width:100%;

padding:12px;

background:#e75480;

color:white;

border:0;

border-radius:15px;

cursor:pointer;

}



button:hover{

background:#c2185b;

}



input,select{

width:100%;

padding:12px;

margin:8px 0;

border-radius:10px;

border:1px solid pink;

}



.status{

color:#e75480;

font-weight:bold;

}



#ordersList{

max-height:450px;

overflow-y:auto;

}


</style>

</head>


<body>



<header>

<h1>
🍽️ Warung Nusantara
</h1>

<p>
Sistem Pemesanan Digital Firestore
</p>


</header>




<div class="container">



<h2>Pilih Lokasi Restoran</h2>



<select id="restoSelect"
onchange="gantiRestoran()">

</select>




<div class="card" id="restoInfo">

Loading...

</div>





<h2>Menu</h2>


<div id="menuList" class="grid">

</div>







<h2>
🛒 Pesanan
</h2>


<input id="nama"
placeholder="Nama Customer">


<input id="phone"
placeholder="Nomor HP">


<input id="meja"
placeholder="Nomor Meja">





<div class="card">


<h3>
Keranjang
</h3>


<div id="cartBox">

Kosong

</div>



<h3 id="total">

Total Rp 0

</h3>


<button onclick="checkout()">

Kirim Pesanan

</button>


<p id="pesanStatus"
class="status">

</p>



</div>







<h2>
📦 Data Pesanan
</h2>



<div id="ordersList">

</div>




</div>

<script type="module">


import {initializeApp}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,
collection,
getDocs,
addDoc,
serverTimestamp,
onSnapshot,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig={


apiKey:"AIzaSyD-m7sqOLaZ8-bWLZeGVPTXT-Qp1vQIycQ",

authDomain:"warung-nusantara-9f331.firebaseapp.com",

projectId:"warung-nusantara-9f331",

storageBucket:"warung-nusantara-9f331.firebasestorage.app",

messagingSenderId:"68513276988",

appId:"1:68513276988:web:b13b148a51ce216efecf39"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);



let restaurantId="jombang01";

let restaurants={};

let cart=[];

let stopOrder=null;





const restoSelect=document.getElementById("restoSelect");

const restoInfo=document.getElementById("restoInfo");

const menuList=document.getElementById("menuList");

const cartBox=document.getElementById("cartBox");

const total=document.getElementById("total");

const ordersList=document.getElementById("ordersList");





const nama=document.getElementById("nama");

const phone=document.getElementById("phone");

const meja=document.getElementById("meja");

const pesanStatus=document.getElementById("pesanStatus");





// ===============================
// LOAD CABANG
// ===============================


async function loadRestaurant(){


let snap=await getDocs(
collection(db,"restaurants")
);



let html="";



snap.forEach(d=>{


restaurants[d.id]=d.data();



html+=`

<option value="${d.id}">

${d.data().name}

</option>

`;



});



restoSelect.innerHTML=html;



// DEFAULT

restaurantId="jombang01";


restoSelect.value=restaurantId;



tampilRestoran();


loadMenu();


loadOrders();



}



loadRestaurant();








// ===============================
// GANTI CABANG
// ===============================


window.gantiRestoran=function(){


restaurantId=restoSelect.value;



cart=[];


renderCart();



tampilRestoran();


loadMenu();


loadOrders();



}








// ===============================
// INFO RESTO
// ===============================


function tampilRestoran(){


let r=restaurants[restaurantId];



restoInfo.innerHTML=`

<h2>

🍽️ ${r.name}

</h2>


<p>

📍 ${r.address || "-"}

</p>


<p>

Status :

${r.status || "Buka"}

</p>


`;



}








// ===============================
// LOAD MENU CABANG
// ===============================


async function loadMenu(){



menuList.innerHTML="Loading...";



let snap=await getDocs(

collection(

db,

"restaurants",

restaurantId,

"menus"

)

);



let html="";



snap.forEach(d=>{


let m=d.data();



let harga=Number(m.price);



html+=`


<div class="card">


<img src="${m.imageUrl || 'https://via.placeholder.com/300'}">


<h3>

${m.name}

</h3>


<p>

Rp ${harga.toLocaleString("id-ID")}

</p>


<button onclick="tambah(${JSON.stringify(m.name)},${harga})">

+ Pesan

</button>


</div>



`;



});



menuList.innerHTML=html || "Menu kosong";



}








// ===============================
// TAMBAH CART
// ===============================



window.tambah=function(nama,harga){


cart.push({

name:nama,

price:harga


});


renderCart();


}







function renderCart(){


let html="";

let totalHarga=0;



cart.forEach(i=>{


html+=`

<p>

${i.name}

Rp ${i.price.toLocaleString("id-ID")}

</p>

`;


totalHarga+=i.price;



});



cartBox.innerHTML=html || "Kosong";


total.innerHTML=

"Total Rp "+totalHarga.toLocaleString("id-ID");



}









// ===============================
// KIRIM ORDER CABANG
// ===============================


window.checkout=async function(){



if(cart.length==0){

alert("Pilih menu dulu");

return;

}




if(!nama.value || !phone.value || !meja.value){

alert("Data customer belum lengkap");

return;

}



let totalHarga=cart.reduce(

(a,b)=>a+b.price,

0

);





await addDoc(


collection(

db,

"restaurants",

restaurantId,

"orders"

),


{

restaurantId:restaurantId,

customerName:nama.value,

phone:phone.value,

tableNumber:meja.value,

items:cart,

totalPrice:totalHarga,

status:"Pending",

createdAt:serverTimestamp()

}



);





alert(

"Pesanan masuk ke "+restaurants[restaurantId].name

);



cart=[];


renderCart();



};









// ===============================
// TAMPIL ORDER SESUAI CABANG
// ===============================



function loadOrders(){



if(stopOrder){

stopOrder();

}



stopOrder=onSnapshot(


collection(

db,

"restaurants",

restaurantId,

"orders"

),



snap=>{


let html="";



snap.forEach(d=>{


let o=d.data();



html+=`


<div class="card">


<h3>

👤 ${o.customerName}

</h3>


<p>

📞 ${o.phone}

</p>



<p>

Meja : ${o.tableNumber}

</p>


<p>

Total :

Rp ${o.totalPrice.toLocaleString("id-ID")}

</p>



<select onchange="ubahStatus('${d.id}',this.value)">



<option ${o.status=="Pending"?"selected":""}>

Pending

</option>


<option ${o.status=="Proses Masak"?"selected":""}>

Proses Masak

</option>


<option ${o.status=="Selesai"?"selected":""}>

Selesai

</option>



</select>


</div>


`;



});



ordersList.innerHTML=

html || "Belum ada pesanan";



}



);



}

// ===============================
// UPDATE STATUS
// ===============================



window.ubahStatus=async function(id,status){



await updateDoc(


doc(

db,

"restaurants",

restaurantId,

"orders",

id

),


{

status:status

}

);



};




</script>


</body>

</html>
