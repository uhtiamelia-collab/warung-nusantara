<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  margin:0;
  background:url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1200') center/cover fixed;
}

/* HEADER AREA */
h1{
  text-align:center;
  color:#ffe7b0;
  text-shadow:0 0 10px rgba(255,200,120,.4);
  margin-top:20px;
}

.subtitle{
  text-align:center;
  margin-top:-10px;
  margin-bottom:10px;
  color:#ffe7b0;
  font-size:14px;
  letter-spacing:1px;
  opacity:0.9;
}

.info-badge{
  background:rgba(255,255,255,0.15);
  padding:8px 14px;
  border-radius:50px;
  margin:6px auto;
  display:block;
  width:fit-content;
  color:#fff;
  font-size:13px;
  backdrop-filter: blur(6px);
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.overlay{
  background:rgba(0,0,0,.65);
  min-height:100vh;
  padding:25px;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
  color:white;
}

h2{
  text-align:center;
  color:#ffdca8;
}

.card{
  background:rgba(255,248,235,.96);
  color:#2b1e14;
  padding:18px;
  margin:15px 0;
  border-radius:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#8b5e3c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#a06b44;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:12px;
}

.status{
  font-weight:bold;
  color:#8b5e3c;
}
</style>
</head>

<body>

<!-- HEADER ESTETIK -->
<h1>🍽️ Warung Nusantara</h1>

<div class="subtitle">
  ✨ Sistem pemesanan digital - realtime
</div>

<div class="info-badge">
  🔔 <span id="alamat">Alamat: Loading...</span>
</div>

<div class="info-badge">
  🕒 Buka: 08.00 - 22.00 WIB
</div>

<div class="overlay">
<div class="container">

<h2>Restoran</h2>
<select id="restoSelect"></select>

<div id="restoInfo" class="card"></div>

<h2>Menu</h2>
<div id="menuList" class="grid"></div>

<h2>Pesanan</h2>
<input id="nama" placeholder="Nama Pelanggan">
<input id="phone" placeholder="No HP">
<select id="meja"></select>

<div class="card">
<h3>Keranjang</h3>
<div id="cartBox">Kosong</div>
<h3 id="total">Total Rp 0</h3>
<button onclick="checkout()">Kirim Pesanan</button>
</div>

<h2>📦 Orders</h2>
<div id="ordersList"></div>

</div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {
getFirestore,
collection,
getDocs,
addDoc,
serverTimestamp,
onSnapshot,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {
  apiKey: "AIzaSyD-m7sqOLaZ8-bWLZeGVPTXT-Qp1vQIycQ",
  authDomain: "warung-nusantara-9f331.firebaseapp.com",
  projectId: "warung-nusantara-9f331",
  storageBucket: "warung-nusantara-9f331.firebasestorage.app",
  messagingSenderId: "68513276988",
  appId: "1:68513276988:web:b13b148a51ce216efecf39"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



let restaurantId="jombang01";

let restaurants={};

let cart=[];

let stopOrder=null;



const restoSelect=document.getElementById("restoSelect");
const restoInfo=document.getElementById("restoInfo");
const menuList=document.getElementById("menuList");
const cartBox=document.getElementById("cartBox");
const totalBox=document.getElementById("total");
const ordersList=document.getElementById("ordersList");




// =====================
// NOMOR MEJA
// =====================

function loadMeja(){

let html=`<option value="">
Pilih Meja
</option>`;


for(let i=1;i<=50;i++){

html+=`

<option value="${i}">
Meja ${i}
</option>

`;

}


document.getElementById("meja").innerHTML=html;

}


loadMeja();





// =====================
// LOAD RESTORAN
// =====================


async function loadRestaurant(){


const snap =
await getDocs(
collection(db,"restaurants")
);



let html="";


snap.forEach(d=>{


restaurants[d.id]=d.data();



html+=`

<option value="${d.id}">
${d.data().name}
</option>

`;

});



restoSelect.innerHTML=html;



if(restaurants["jombang01"]){

restaurantId="jombang01";

restoSelect.value="jombang01";

}



showResto();

loadMenu();

loadOrders();



}



loadRestaurant();






// =====================
// GANTI CABANG
// =====================


restoSelect.onchange=function(){


restaurantId=this.value;


cart=[];

renderCart();


showResto();


loadMenu();


loadOrders();


}







// =====================
// INFO RESTO
// =====================


function showResto(){


let r=restaurants[restaurantId];


if(!r)return;



restoInfo.innerHTML=`

<h2>
🍽️ ${r.name}
</h2>


<p>
📍 ${r.address || "-"}
</p>


<p>
🕒 ${r.openHours || "08.00 - 22.00"}
</p>

`;



document.getElementById("alamat").innerHTML=
"Alamat : "+(r.address || "-");


}








// =====================
// MENU
// =====================



async function loadMenu(){



menuList.innerHTML="Loading menu...";



const snap =
await getDocs(

collection(

db,

"restaurants",

restaurantId,

"menus"

)

);



let html="";



snap.forEach(d=>{


let m=d.data();



let harga=
Number(m.price || 0);



html+=`

<div class="card">


<img src="${m.imageUrl || 
'https://via.placeholder.com/300'}">


<h3>
${m.name}
</h3>


<p>
${m.category || ""}
</p>


<p>
Rp ${harga.toLocaleString("id-ID")}
</p>


<button onclick="tambah('${m.name}',${harga})">

+ Pesan

</button>


</div>

`;



});



menuList.innerHTML =
html || "Menu kosong";


}








// =====================
// CART
// =====================


window.tambah=function(nama,harga){


cart.push({

name:nama,

price:harga

});


renderCart();


}



function renderCart(){


let html="";

let total=0;



cart.forEach(i=>{


html+=`

<p>

${i.name}

Rp ${i.price.toLocaleString("id-ID")}

</p>

`;


total+=i.price;


});



cartBox.innerHTML =
html || "Kosong";


totalBox.innerHTML =
"Total Rp "+total.toLocaleString("id-ID");


}








// =====================
// CHECKOUT
// =====================



window.checkout=async function(){



let nama=
document.getElementById("nama").value;


let phone=
document.getElementById("phone").value;


let meja=
document.getElementById("meja").value;



if(cart.length==0){

alert("Pilih menu dulu");

return;

}



if(!nama || !meja){

alert("Isi data");

return;

}



let total =
cart.reduce(
(a,b)=>a+b.price,0
);




await addDoc(

collection(

db,

"restaurants",

restaurantId,

"orders"

),

{


customerName:nama,

phone:phone,

tableNumber:meja,


items:cart,


totalPrice:total,


status:"Pending",


createdAt:serverTimestamp()


}


);




alert(
"Pesanan masuk ke "+
restaurants[restaurantId].name
);



cart=[];

renderCart();


}









// =====================
// REALTIME ORDER CABANG
// =====================


function loadOrders(){



if(stopOrder){

stopOrder();

}



stopOrder = onSnapshot(


collection(

db,

"restaurants",

restaurantId,

"orders"

),


(snapshot)=>{


let html="";



snapshot.forEach(d=>{


let o=d.data();



html+=`

<div class="card">


<h3>
👤 ${o.customerName}
</h3>


<p>
📞 ${o.phone}
</p>


<p>
🪑 Meja ${o.tableNumber}
</p>



<h3>

Rp ${Number(o.totalPrice)
.toLocaleString("id-ID")}

</h3>



<select onchange="ubahStatus('${d.id}',this.value)">


<option ${o.status=="Pending"?"selected":""}>
Pending
</option>


<option ${o.status=="Masak"?"selected":""}>
Masak
</option>


<option ${o.status=="Selesai"?"selected":""}>
Selesai
</option>


</select>


</div>


`;



});



ordersList.innerHTML =
html || "Belum ada pesanan";



}


);



}








window.ubahStatus=async function(id,status){


await updateDoc(

doc(

db,

"restaurants",

restaurantId,

"orders",

id

),


{

status:status

}

);


}



</script>
</body>
</html>
