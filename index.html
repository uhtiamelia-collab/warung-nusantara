<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warung Nusantara</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>


*{
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

margin:0;
background:#fff0f5;
color:#5a3038;

}



header{

background:linear-gradient(135deg,#ffb6c1,#ffc0cb);

padding:35px;

text-align:center;

color:#8b2f4d;

border-radius:0 0 40px 40px;

}



.container{

width:90%;
max-width:1100px;

margin:30px auto;

}



.card{

background:white;

padding:20px;

border-radius:20px;

margin:15px 0;

box-shadow:0 5px 20px rgba(0,0,0,.1);

}



.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}



img{

width:100%;

height:200px;

object-fit:cover;

border-radius:15px;

}



button{

width:100%;

padding:12px;

background:#e75480;

color:white;

border:0;

border-radius:15px;

cursor:pointer;

}



button:hover{

background:#c2185b;

}



input,select{

width:100%;

padding:12px;

margin:8px 0;

border-radius:10px;

border:1px solid pink;

}



.status{

color:#e75480;

font-weight:bold;

}



#ordersList{

max-height:450px;

overflow-y:auto;

}


</style>

</head>


<body>



<header>

<h1>
🍽️ Warung Nusantara
</h1>

<p>
Sistem Pemesanan Digital Firestore
</p>


</header>




<div class="container">



<h2>Pilih Lokasi Restoran</h2>



<select id="restoSelect"
onchange="gantiRestoran()">

</select>




<div class="card" id="restoInfo">

Loading...

</div>





<h2>Menu</h2>


<div id="menuList" class="grid">

</div>







<h2>
🛒 Pesanan
</h2>


<input id="nama"
placeholder="Nama Customer">


<input id="phone"
placeholder="Nomor HP">


<select id="meja">
<option value="">Pilih Nomor Meja</option>
</select>

<div class="card">


<h3>
Keranjang
</h3>


<div id="cartBox">

Kosong

</div>



<h3 id="total">

Total Rp 0

</h3>


<button onclick="checkout()">

Kirim Pesanan

</button>


<p id="pesanStatus"
class="status">

</p>



</div>







<h2>
📦 Data Pesanan
</h2>



<div id="ordersList">

</div>




</div>








<script type="module">


import {initializeApp}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getFirestore,

collection,

getDocs,

addDoc,

serverTimestamp,

onSnapshot,

doc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







const firebaseConfig = {


apiKey:
"AIzaSyD-m7sqOLaZ8-bWLZeGVPTXT-Qp1vQIycQ",


authDomain:
"warung-nusantara-9f331.firebaseapp.com",


projectId:
"warung-nusantara-9f331",


storageBucket:
"warung-nusantara-9f331.firebasestorage.app",


messagingSenderId:
"68513276988",


appId:
"1:68513276988:web:b13b148a51ce216efecf39"

};





const app = initializeApp(firebaseConfig);


const db = getFirestore(app);





let restaurantId="jombang01";


let restaurants={};


let cart=[];
let stopOrder=null;

function loadMeja(){

let html = '<option value="">Pilih Nomor Meja</option>';

for(let i=1; i<=200; i++){

html += `<option value="${i}">Meja ${i}</option>`;

}

document.getElementById("meja").innerHTML = html;

}
// ==========================
// AMBIL DATA RESTORAN
// ==========================


async function loadRestaurant(){

const snap = await getDocs(
collection(db,"restaurants")
);

let html="";

snap.forEach((item)=>{

let r=item.data();

restaurants[item.id]=r;

html += `
<option value="${item.id}">
${r.name}
</option>
`;

});

document.getElementById("restoSelect").innerHTML=html;

// DEFAULT JOMBANG
if(restaurants["jombang01"]){
restaurantId="jombang01";
document.getElementById("restoSelect").value="jombang01";
}

showRestaurant();
loadMenu();
loadOrders();

}
loadMeja();
loadRestaurant();









// ==========================
// PINDAH RESTORAN
// ==========================


window.gantiRestoran=function(){
    restaurantId = document.getElementById("restoSelect").value;
    cart=[];
    renderCart();
    showRestaurant();
    loadMenu();
    loadOrders();
};
// ==========================
// INFO RESTORAN
// ==========================


function showRestaurant(){



let r=restaurants[restaurantId];



if(!r)return;



document.getElementById("restoInfo").innerHTML=`


<h2>
🍽️ ${r.name}
</h2>


<p>
📍 ${r.address || "-"}
</p>


<p>

🕒 ${r.openHour || "08:00 - 21:00"}

</p>


<p>

Status :

<b>

${r.status || "Buka"}

</b>

</p>


`;



}









// ==========================
// MENU
// ==========================


async function loadMenu(){



const snap = await getDocs(


collection(

db,

"restaurants",

restaurantId,

"menus"

)


);





let html="";



snap.forEach((item)=>{



let m=item.data();





let harga = Number(

m.price ??

m.harga ??

m.priceMenu ??

0

);





let gambar =

m.imageUrl ??

m.image ??

m.photo ??

"https://via.placeholder.com/300";





html += `



<div class="card">


<img src="${gambar}">


<h3>

${m.name}

</h3>


<p>

${m.category}

</p>



<p>

Rp ${harga.toLocaleString("id-ID")}

</p>



<button onclick="tambah('${m.name}',${harga})">

+ Pesan

</button>



</div>



`;



});




document.getElementById("menuList").innerHTML=html;



}









// ==========================
// KERANJANG
// ==========================


window.tambah=function(name,price){
    console.log("Tombol + Pesan diklik", name, price);

    cart.push({
        name,
        price
    });

    renderCart();
}





function renderCart(){



let html="";

let total=0;



cart.forEach(item=>{


html += `

<p>

${item.name}

Rp ${item.price.toLocaleString("id-ID")}

</p>

`;


total += item.price;


});



document.getElementById("cartBox").innerHTML=

html || "Kosong";



document.getElementById("total").innerHTML=

"Total Rp "+total.toLocaleString("id-ID");



}









// ==========================
// SIMPAN ORDER
// ==========================


window.checkout=async()=>{
    console.log("Checkout diklik");



if(cart.length==0){
alert("Pilih menu dulu");
return;
}

if(document.getElementById("meja").value==""){
alert("Pilih nomor meja dulu");
return;
}




let total = cart.reduce(

(a,b)=>a+b.price,

0

);

await addDoc(

collection(
db,
"restaurants",
restaurantId,
"orders"
),

{

restaurantId:restaurantId,


restaurantName:
restaurants[restaurantId].name,


customerName: document.getElementById("nama").value,
phone: document.getElementById("phone").value,
tableNumber: document.getElementById("meja").value,


items:cart,


totalPrice: total,


status:"Pending",


createdAt:serverTimestamp()

}

);
cart=[];


renderCart();


document.getElementById("pesanStatus").innerHTML = "✅ Pesanan berhasil";
};
// ==========================
// DATA ORDER REALTIME
// ==========================



function loadOrders(){
if(stopOrder){
stopOrder();
}



stopOrder = onSnapshot(

collection(
db,
"restaurants",
restaurantId,
"orders"
),


(snapshot)=>{


let html="";



snapshot.forEach((item)=>{
   let o = item.data();



html += `

<div class="card">

<h3>
👤 ${o.customerName}
</h3>


<p>
📞 ${o.phone}
</p>


<p>
🏪 Cabang :
${restaurants[restaurantId].name}
</p>



<p>
🪑 Meja :
${o.tableNumber}
</p>



<h3>

Rp ${Number(o.totalPrice)
.toLocaleString("id-ID")}

</h3>



<p>

Status :

<select 
onchange="ubahStatus('${item.id}',this.value)"
>


<option 
${o.status=="Pending"?"selected":""}>
Pending
</option>


<option
${o.status=="Diproses"?"selected":""}>
Diproses
</option>



<option
${o.status=="Selesai"?"selected":""}>
Selesai
</option>


</select>


</p>



</div>


`;



});



document.getElementById("ordersList").innerHTML =
html || "Belum ada pesanan";



}

);



}
window.ubahStatus = async(id,status)=>{
  await updateDoc(
    doc(db,"restaurants",restaurantId,"orders",id),
    { status }
  );
};


</script>
</body>
</html>
