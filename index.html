<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warung Nusantara</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

margin:0;
background:#fff0f5;
color:#5a3038;

}


header{

background:#ffb6c1;
padding:35px;
text-align:center;
color:#8b2f4d;

}



.container{

width:90%;
max-width:1100px;
margin:30px auto;

}



.card{

background:white;
padding:20px;
border-radius:20px;
margin:15px 0;
box-shadow:0 5px 20px rgba(0,0,0,.1);

}



.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}



img{

width:100%;
height:200px;
object-fit:cover;
border-radius:15px;

}



button{

width:100%;
padding:12px;
background:#e75480;
color:white;
border:0;
border-radius:15px;
cursor:pointer;

}



button:hover{

background:#c2185b;

}



input,select{

width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid pink;

}



.status{

color:#e75480;
font-weight:bold;

}



</style>

</head>



<body>



<header>

<h1>🍽️ Warung Nusantara</h1>

<p>Sistem Pemesanan Firestore</p>

</header>



<div class="container">



<h2>Pilih Restoran</h2>


<select id="restoSelect"
onchange="pilihRestoran()">

<option value="">
-- Pilih Restoran --
</option>


</select>



<div class="card" id="restoInfo">

Belum memilih restoran

</div>






<h2>Menu</h2>


<div id="menuList" class="grid"></div>







<h2>🛒 Pesanan</h2>



<input id="nama"
placeholder="Nama Customer">


<input id="phone"
placeholder="Nomor HP">


<input id="meja"
placeholder="Nomor Meja">





<div class="card">


<h3>Keranjang</h3>


<div id="cartBox">

Kosong

</div>


<h3 id="total">

Total Rp 0

</h3>


<button onclick="checkout()">

Kirim Pesanan

</button>


<p id="pesanStatus"
class="status"></p>


</div>







<h2>📦 Data Pesanan</h2>


<div id="ordersList"></div>





</div>









<script type="module">


import {initializeApp}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {


getFirestore,

collection,

getDocs,

addDoc,

serverTimestamp,

onSnapshot


}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







const firebaseConfig={


apiKey:"AIzaSyD-m7sqOLaZ8-bWLZeGVPTXT-Qp1vQIycQ",

authDomain:"warung-nusantara-9f331.firebaseapp.com",

projectId:"warung-nusantara-9f331",

storageBucket:"warung-nusantara-9f331.firebasestorage.app",

messagingSenderId:"68513276988",

appId:"1:68513276988:web:b13b148a51ce216efecf39"


};





const app=initializeApp(firebaseConfig);


const db=getFirestore(app);




let restaurantId="";


let restoranData={};


let cart=[];







// =====================
// LOAD RESTORAN
// =====================


async function loadRestoran(){



const snap=await getDocs(

collection(db,"restaurants")

);



let html=`

<option value="">

-- Pilih Restoran --

</option>

`;



snap.forEach(doc=>{


let r=doc.data();



restoranData[doc.id]=r;



html+=`

<option value="${doc.id}">

${r.name || doc.id}

</option>

`;



});



document.getElementById("restoSelect").innerHTML=html;



}



loadRestoran();









// =====================
// PILIH RESTORAN
// =====================



window.pilihRestoran=function(){


restaurantId=document.getElementById("restoSelect").value;



let r=restoranData[restaurantId];



if(!r)return;




document.getElementById("restoInfo").innerHTML=



`

<h2>

🍽️ ${r.name}

</h2>


<p>

📍 ${r.address || "-"}

</p>



<p>

🕒 ${r.openHour || "08:00 - 21:00"}

</p>



<p>

Status :

<b>${r.status || "Buka"}</b>

</p>


`;



loadMenu();



};









// =====================
// LOAD MENU
// =====================



async function loadMenu(){



const snap=await getDocs(

collection(

db,

"restaurants",

restaurantId,

"menus"

)

);



let html="";



snap.forEach(doc=>{


let m=doc.data();




let harga=

Number(m.price || 0);



let gambar=

m.imageUrl ||

"https://via.placeholder.com/300";





html+=`


<div class="card">


<img src="${gambar}">



<h3>

${m.name || "Menu"}

</h3>



<p>

${m.category || "Makanan"}

</p>



<p>

Rp ${harga.toLocaleString()}

</p>



<button onclick="tambahMenu(

'${m.name}',

${harga}

)">


+ Pesan


</button>



</div>


`;



});



document.getElementById("menuList").innerHTML=html;



}










// =====================
// CART
// =====================


window.tambahMenu=function(name,price){


cart.push({

name,
price

});


renderCart();


};






function renderCart(){


let html="";

let total=0;



cart.forEach(x=>{


html+=`

<p>

${x.name}

Rp ${x.price.toLocaleString()}

</p>

`;


total+=x.price;


});



document.getElementById("cartBox").innerHTML=

html || "Kosong";


document.getElementById("total").innerHTML=

"Total Rp "+total.toLocaleString();



}









// =====================
// CHECKOUT
// =====================



window.checkout=async()=>{


if(!restaurantId){

alert("Pilih restoran dulu");

return;

}



let total=

cart.reduce(

(a,b)=>a+b.price,

0

);




let order=await addDoc(

collection(db,"orders"),

{


restaurantId,


customerName:
nama.value,


phone:
phone.value,


tableNumber:
meja.value,


status:"Pending",


totalPrice:total,


createdAt:serverTimestamp()


}


);



for(let item of cart){


await addDoc(

collection(

db,

"orders",

order.id,

"items"

),

{


menuName:item.name,


price:item.price


}

);



}



cart=[];


renderCart();



pesanStatus.innerHTML=

"✅ Pesanan berhasil";


};









// =====================
// REALTIME ORDER
// =====================



onSnapshot(

collection(db,"orders"),

snap=>{


let html="";



snap.forEach(doc=>{


let o=doc.data();



html+=`

<div class="card">


<h3>

${o.customerName}

</h3>


<p>

Restoran : ${o.restaurantId}

</p>



<p>

Meja : ${o.tableNumber}

</p>



<p>

Total :

Rp ${Number(o.totalPrice).toLocaleString()}

</p>



<p>

Status :

${o.status}

</p>


</div>


`;



});



ordersList.innerHTML=html;



}

);



</script>



</body>

</html>
