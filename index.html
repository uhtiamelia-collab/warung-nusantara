<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#111;
  color:white;
}

h1{
  text-align:center;
  color:#ffdca8;
  margin-top:20px;
}

.container{
  padding:20px;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

button{
  width:100%;
  padding:10px;
  background:#8b5e3c;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<h1>🍽️ Warung Nusantara</h1>

<div class="container">

<h2>Menu</h2>
<div id="menuList" class="grid"></div>

<h2>Pesanan</h2>

<input id="nama" placeholder="Nama Customer">
<input id="phone" placeholder="No HP">
<select id="meja"></select>

<div class="card">
<h3>Keranjang</h3>
<div id="cartBox">Kosong</div>
<h3 id="total">Rp 0</h3>
<button onclick="checkout()">Kirim Pesanan</button>
</div>

<h2>📦 Orders Realtime</h2>
<div id="ordersList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
onSnapshot,
setDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 GANTI INI */
const firebaseConfig = {
apiKey: "ISI_API_KEY",
authDomain: "ISI_AUTH_DOMAIN",
projectId: "ISI_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

/* ================= MENU ================= */
async function loadMenu(){
  const snap = await getDocs(collection(db,"menus"));

  let html = "";

  snap.forEach(d=>{
    const m = d.data();

    html += `
      <div class="card">
        <h3>${m.name}</h3>
        <p>Rp ${m.price}</p>
        <button onclick="addItem('${m.name}',${m.price})">Tambah</button>
      </div>
    `;
  });

  document.getElementById("menuList").innerHTML = html;
}

/* ================= CART ================= */
window.addItem = (name,price)=>{
  cart.push({name,price});
  renderCart();
}

function renderCart(){
  let html="";
  let total=0;

  cart.forEach(i=>{
    html += `<p>${i.name} - Rp ${i.price}</p>`;
    total += i.price;
  });

  document.getElementById("cartBox").innerHTML = html || "Kosong";
  document.getElementById("total").innerHTML = "Rp " + total;
}

/* ================= CHECKOUT (ORDER + CUSTOMER NYAMBUNG) ================= */
window.checkout = async ()=>{

  const nama = document.getElementById("nama").value;
  const phone = document.getElementById("phone").value;
  const meja = document.getElementById("meja").value;

  if(cart.length === 0) return alert("Keranjang kosong");
  if(!nama || !phone) return alert("Isi data lengkap");

  const total = cart.reduce((a,b)=>a + b.price, 0);

  const customerId = phone; // 🔥 ID penghubung

  try {

    // 🔥 CUSTOMER (UPDATE / AUTO NYAMBUNG)
    await setDoc(doc(db,"customers",customerId), {
      customerId,
      name: nama,
      phone,
      lastOrderTotal: total,
      updatedAt: new Date()
    }, { merge:true });

    // 🔥 ORDER
    await addDoc(collection(db,"orders"), {
      customerId,
      customerName: nama,
      phone,
      tableNumber: Number(meja),
      status: "Pending",
      totalPrice: total,
      createdAt: new Date()
    });

    cart = [];
    renderCart();

    alert("Pesanan & Customer tersimpan ✔");

  } catch (e) {
    console.error(e);
    alert("Gagal kirim data");
  }
};

/* ================= ORDERS REALTIME ================= */
function loadOrders(){

  onSnapshot(collection(db,"orders"), (snap)=>{

    let html = "";

    snap.forEach(d=>{
      const o = d.data();

      html += `
        <div class="card">
          <b>${o.customerName}</b><br>
          📱 ${o.phone}<br>
          🪑 Meja ${o.tableNumber}<br>
          📌 ${o.status}<br>
          💰 Rp ${o.totalPrice}
        </div>
      `;
    });

    document.getElementById("ordersList").innerHTML =
      html || "Belum ada order";
  });
}

/* ================= MEJA ================= */
function loadMeja(){
  let html = "<option value=''>Pilih Meja</option>";

  for(let i=1;i<=10;i++){
    html += `<option value="${i}">Meja ${i}</option>`;
  }

  document.getElementById("meja").innerHTML = html;
}

/* ================= INIT ================= */
loadMeja();
loadMenu();
loadOrders();

</script>

</body>
</html>
